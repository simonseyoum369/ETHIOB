        }
        .gap-2 {
            gap: 12px;
        }
        .mt-1 {
            margin-top: 8px;
        }
        .mt-2 {
            margin-top: 14px;
        }
        .mb-1 {
            margin-bottom: 8px;
        }
        .mb-2 {
            margin-bottom: 14px;
        }
        .text-muted {
            color: #64748b;
            font-size: 14px;
        }
        .text-small {
            font-size: 13px;
        }
        .font-bold {
            font-weight: 700;
        }
        .text-center {

        }

            color: #b91c1c;

            color: #166534;

            color: #92400e;

            left: 3px;

            }

            }

            display: none !important;
        }
        .fade-in {
            animation: fadeIn 0.25s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;

            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: 0.3s;
            max-width: 90%;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        /* Modal overlay for daily quote */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
            padding: 20px;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-overlay.show .modal-box {
            transform: scale(1) translateY(0);
        }
        .modal-box {
            background: white;
            border-radius: 32px;
            max-width: 400px;
            width: 100%;
            padding: 32px 28px 28px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            transform: scale(0.92) translateY(20px);
            transition: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }
        .modal-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #0891b2, #0d9488, #10b981);
        }
        .modal-box .quote-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .modal-box .quote-text {
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
            line-height: 1.5;
            margin-bottom: 6px;

            font-family: 'Noto Sans Ethiopic', 'Inter', sans-serif;

            font-size: 14px;
            color: #64748b;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .modal-box .quote-date {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 18px;
        }

            max-width: 200px;
            margin: 0 auto;

            border: 1px solid #bae6fd;
            margin-bottom: 12px;

        .quote-badge:hover {

            border-color: #0891b2;
        }
        .quote-badge .icon {
            font-size: 28px;
        }
        .quote-badge .preview {
            font-size: 13px;
            color: #0f172a;
            font-weight: 500;
            flex: 1;

        .quote-badge .preview.amharic {

        }
        .quote-badge .lang-tag {
            font-size: 10px;
            background: #0891b2;
            color: white;
            padding: 2px 10px;
            border-radius: 40px;
            font-weight: 700;
        }
    </style>
</head>

    function _(key, vars = {}) {
        let text = t[state.lang][key] || key;
        for (const [k, v] of Object.entries(vars)) {
            text = text.replace(`{${k}}`, v);
        }
        return text;
    }

    // =====================================================
    //  HELPERS
    // =====================================================
    function getReadingsForDate(date) {
        return state.readings.filter(r => r.date === date);
    }

    function getDailyAverage(date) {
        const dayReadings = getReadingsForDate(date);
        if (dayReadings.length === 0) return null;
        const sum = dayReadings.reduce((a, b) => a + b.value, 0);
        return Math.round(sum / dayReadings.length);
    }

    function getReading(meal, time, date) {
        const found = state.readings.find(r => r.date === date && r.meal === meal && r.time === time);
        return found ? found.value : null;
    }

    function getStatusColor(value, type) {
        if (!value) return '#94a3b8';
        if (type === 'before') {
            if (value < 70) return '#ef4444';
            if (value <= 130) return '#10b981';
            if (value <= 180) return '#f59e0b';
            return '#ef4444';
        } else {
            if (value < 140) return '#10b981';
            if (value <= 180) return '#f59e0b';
            return '#ef4444';
        }
    }

    function getStatusLabel(value, type) {
        if (!value) return '—';
        if (type === 'before') {
            if (value < 70) return 'Low';
            if (value <= 130) return 'Normal';
            if (value <= 180) return 'Elevated';
            return 'High';
        } else {
            if (value < 140) return 'Normal';
            if (value <= 180) return 'Elevated';
            return 'High';
        }
    }

    function showToast(message) {
        const el = document.getElementById('toast');
        el.textContent = message;
        el.classList.add('show');
        clearTimeout(el._timeout);
        el._timeout = setTimeout(() => el.classList.remove('show'), 2800);
    }

    // =====================================================
    //  DAILY QUOTE SYSTEM
    // =====================================================
    function getDailyQuote() {
        const today = new Date().toDateString();
        // Use a deterministic but pseudo-random selection based on date
        const seed = today.split(' ').join('').length + new Date().getDate() + new Date().getMonth() * 31;
        const index = seed % quotesDB.length;
        return quotesDB[index];
    }

    function showDailyQuote() {
        const modal = document.getElementById('quoteModal');
        const quote = getDailyQuote();
        state.currentQuote = quote;

        const isAm = state.lang === 'am';
        const textEl = document.getElementById('quoteText');
        const authorEl = document.getElementById('quoteAuthor');
        const iconEl = document.getElementById('quoteIcon');
        const dateEl = document.getElementById('quoteDate');

        iconEl.textContent = quote.icon;
        if (isAm) {
            textEl.textContent = `"${quote.am.text}"`;
            textEl.className = 'quote-text amharic';
            authorEl.textContent = `— ${quote.am.author}`;
        } else {
            textEl.textContent = `"${quote.en.text}"`;
            textEl.className = 'quote-text';
            authorEl.textContent = `— ${quote.en.author}`;
        }
        dateEl.textContent = `📅 ${new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}`;

        modal.classList.add('show');
        state.quoteShownToday = true;
    }

    window.closeQuote = function() {
        document.getElementById('quoteModal').classList.remove('show');
        showToast(_('toast_quote_closed'));
    };

    // Close on backdrop click
    document.getElementById('quoteModal').addEventListener('click', function(e) {
        if (e.target === this) closeQuote();
    });

    // =====================================================
    //  LANGUAGE TOGGLE
    // =====================================================
    window.toggleLanguage = function() {
        state.lang = state.lang === 'en' ? 'am' : 'en';
        const btn = document.getElementById('langToggle');
        const icon = document.getElementById('langIcon');
        const label = document.getElementById('langLabel');
        if (state.lang === 'am') {
            icon.textContent = '🇪🇹';
            label.textContent = 'አማ';
            btn.classList.add('active');
        } else {
            icon.textContent = '🇬🇧';
            label.textContent = 'EN';
            btn.classList.remove('active');
        }
        render();
        showToast(_('toast_lang_changed', { lang: state.lang === 'en' ? 'English' : 'አማርኛ' }));
    };

    // =====================================================
    //  NAVIGATION
    // =====================================================
    window.navigateTo = function(screen) {
        if (!state.isLoggedIn && screen !== 'onboarding' && screen !== 'login' && screen !== 'signup') {
            state.screen = 'onboarding';
            render();
            return;
        }
        state.screen = screen;
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.tab === screen);
        });
        render();
    };

    // =====================================================
    //  RENDER ENGINE
    // =====================================================
    function render() {
        const container = document.getElementById('screenContainer');
        let html = '';

        if (!state.isLoggedIn) {
            if (state.screen === 'signup') {
                html = renderSignup();
            } else if (state.screen === 'login') {
                html = renderLogin();
            } else {
                html = renderOnboarding();
            }
            container.innerHTML = `<div class="fade-in">${html}</div>`;
            updateNavVisibility(false);
            return;
        }

        switch (state.screen) {
            case 'dashboard':
                html = renderDashboard();
                break;
            case 'tracking':
                html = renderTracking();
                break;
            case 'emergency':
                html = renderEmergency();
                break;

    window.editReading = function(meal, time) {
        const current = getReading(meal, time, state.today);
        const val = prompt(`Enter ${meal} ${time} glucose (mg/dL):`, current || '');
        if (val !== null && !isNaN(val) && val >= 20 && val <= 600) {
            const existing = state.readings.find(r => r.date === state.today && r.meal === meal && r.time === time);
            if (existing) {
                existing.value = parseInt(val);
            } else {
                state.readings.push({ date: state.today, meal, time, value: parseInt(val) });
            }
            showToast(_('toast_reading_saved'));
            render();
        } else if (val !== null) {
            showToast('⚠️ Please enter a value between 20-600 mg/dL');
        }
    };

                    <div class="grid-2" style="margin:8px 0; font-size:13px;">
                        <div><span style="color:#64748b;">${_('morning')}</span> ${m.morning || '—'} ${m.unit}</div>
                        <div><span style="color:#64748b;">${_('afternoon')}</span> ${m.afternoon || '—'} ${m.unit}</div>
                        <div><span style="color:#64748b;">${_('night')}</span> ${m.night || '—'} ${m.unit}</div>
                        <div><span style="color:#64748b;">${_('total')}</span> ${(m.morning || 0) + (m.afternoon || 0) + (m.night || 0)} ${m.unit}</div>
                    </div>
                    <div class="flex-between">
                        <span style="font-size:13px; color:#64748b;">🔔 ${_('reminder_label')}</span>
                        <div class="toggle ${m.reminder ? 'active' : ''}" onclick="this.classList.toggle('active'); showToast('Reminder toggled')"><div class="dot"></div></div>
                    </div>
                </div>
            `).join('')}

            <div class="card" style="background:#fef3c7; border:2px solid #f59e0b;">
                <div style="font-weight:700;">🕊️ ${_('fasting_season')}</div>
                <div style="font-size:13px; color:#92400e;">${state.user.fastingMode ? '✅ ' + _('fasting_active') : '⏸️ ' + _('fasting_inactive')}</div>
                <button class="btn btn-sm btn-secondary" style="width:auto; padding:6px 16px; margin-top:6px; font-size:13px;" onclick="toggleFastingMode()">
                    ${state.user.fastingMode ? _('fasting_disable') : _('fasting_enable')}
                </button>
            </div>
        `;
    }

    window.addMedication = function() {
        const name = prompt('Enter medication name:', 'New Med');
        if (name) {
            state.medications.push({
                id: Date.now(),
                name: name,
                type: 'Custom',
                morning: 0,
                afternoon: 0,
                night: 0,
                unit: 'mg',
                active: true,
                reminder: true
            });
            showToast(_('toast_med_added'));
            render();
        }
    };

    // =====================================================
    //  PROFILE
    // =====================================================
    function renderProfile() {
        const u = state.user;
        return `
            <div style="display:flex; align-items:center; gap:14px; margin-bottom:14px;">
                <div style="width:64px; height:64px; background:linear-gradient(135deg,#0891b2,#0d9488); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px;">👤</div>
                <div>
                    <div style="font-weight:800; font-size:20px;">${u.name}</div>
                    <div style="color:#475569; font-size:14px;">${u.email}</div>
                    <div style="background:#f0fdfa; color:#0891b2; padding:2px 12px; border-radius:40px; font-size:11px; font-weight:600; display:inline-block; margin-top:2px;">🩸 ${u.diabetesType} • Since 2018</div>
                </div>
            </div>

            <div class="card">
                <div class="flex-between"><span style="font-weight:700;">🏥 ${_('medical_info')}</span><span style="color:#0891b2; font-weight:600; cursor:pointer;" onclick="showToast('✏️ Edit mode opened')">${_('edit')}</span></div>
                <div class="flex-between" style="padding:6px 0; border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">🩸 ${_('diabetes_type')}</span><span style="font-weight:600;">${u.diabetesType}</span></div>
                <div class="flex-between" style="padding:6px 0; border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">📅 ${_('diagnosis_date')}</span><span style="font-weight:600;">${u.diagnosisDate}</span></div>
                <div class="flex-between" style="padding:6px 0; border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">🩸 ${_('blood_group')}</span><span style="font-weight:600;">${u.bloodGroup}</span></div>
                <div class="flex-between" style="padding:6px 0;"><span style="color:#64748b;">🏥 ${_('hospital')}</span><span style="font-weight:600;">${u.hospital}</span></div>
            </div>

            <div class="card">
                <div class="flex-between"><span style="font-weight:700;">📞 ${_('emergency_contact_label')}</span><span style="color:#0891b2; font-weight:600; cursor:pointer;" onclick="showToast('✏️ Edit emergency contact')">${_('edit')}</span></div>
                <div class="flex-between" style="padding:6px 0;"><span style="color:#64748b;">👤 ${u.emergencyName}</span><span style="font-weight:600;">${u.emergencyPhone}</span></div>
                <div style="color:#64748b; font-size:13px;">${u.relation} • ${u.emergencyAddress}</div>
            </div>

            <div class="card">
                <div style="font-weight:700;">⚙️ ${_('settings')}</div>
                <div class="flex-between" style="padding:6px 0;"><span>🌐 ${_('language')}</span><span style="color:#0891b2; font-weight:500; cursor:pointer;" onclick="toggleLanguage()">${state.lang === 'en' ? 'English 🇬🇧' : 'አማርኛ 🇪🇹'}</span></div>
                <div class="flex-between" style="padding:6px 0;"><span>🔔 ${_('notifications')}</span><div class="toggle active" onclick="this.classList.toggle('active')"><div class="dot"></div></div></div>
                <div class="flex-between" style="padding:6px 0;"><span>☁️ ${_('cloud_sync')}</span><div class="toggle active" onclick="this.classList.toggle('active')"><div class="dot"></div></div></div>
            </div>

            <button class="btn btn-secondary mt-1" onclick="navigateTo('dashboard')">← ${_('back')}</button>
        `;
    }

    // =====================================================
    //  REPORTS
    // =====================================================
    function renderReports() {
        return `
            <div class="flex-between">
                <span style="font-weight:700; font-size:20px;">📄 ${_('reports_title')}</span>
                <span style="background:#f0fdfa; color:#0891b2; padding:4px 12px; border-radius:40px; font-size:11px; font-weight:600;">12 weeks</span>
            </div>

            <div class="card" style="background:linear-gradient(135deg,#0891b2,#0d9488); color:white;">
                <div style="font-weight:700;">✨ ${_('generate_report')}</div>
                <div style="font-size:13px; opacity:0.9;">Create comprehensive report for your doctor</div>
                <div class="flex-row" style="margin-top:10px;">
                    <div style="flex:1; background:rgba(255,255,255,0.15); padding:10px; border-radius:12px; text-align:center; cursor:pointer;" onclick="showToast(_('toast_report_generated'))">📊 ${_('quick_summary')}</div>
                    <div style="flex:1; background:rgba(255,255,255,0.15); padding:10px; border-radius:12px; text-align:center; cursor:pointer;" onclick="showToast(_('toast_report_generated'))">📋 ${_('full_report')}</div>
                </div>
            </div>

            <div class="card">
                <div class="flex-between"><span style="font-weight:700;">📊 ${_('monthly_summary')}</span><span style="color:#94a3b8; font-size:12px;">June 2026</span></div>
                <div style="display:flex; gap:4px; height:40px; align-items:flex-end; margin:8px 0;">
                    ${[30, 35, 40, 28, 32, 38, 25].map(h => `<div style="flex:1; background:#10b981; height:${h}px; border-radius:4px;"></div>`).join('')}
                </div>
                <div class="flex-row" style="gap:4px;">
                    <button class="btn btn-primary btn-sm" style="flex:1; padding:6px;" onclick="showToast('📊 Viewing report')">👁️ ${_('view')}</button>
                    <button class="btn btn-outline btn-sm" style="flex:1; padding:6px;" onclick="showToast('📥 PDF downloaded')">📥 ${_('pdf')}</button>
                    <button class="btn btn-outline btn-sm" style="flex:1; padding:6px;" onclick="showToast('📤 Shared')">📤 ${_('share_report')}</button>
                </div>
            </div>

            <div class="card" style="border:2px solid #fee2e2;">
                <div style="color:#dc2626; font-weight:700;">🚨 ${_('emergency_id_card')}</div>
                <div style="font-size:14px; color:#475569;">${state.user.name} · ${state.user.diabetesType}</div>
                <div style="font-size:13px; color:#64748b;">📞 ${state.user.emergencyPhone}</div>
                <button class="btn btn-danger btn-sm mt-1" style="padding:8px;" onclick="navigateTo('emergency')">🆘 ${_('view_card')}</button>
            </div>
        `;
    }

    // =====================================================
    //  INIT
    // =====================================================
    render();

    // expose functions globally
    window.navigateTo = navigateTo;
    window.toggleLanguage = toggleLanguage;
    window.switchAuth = switchAuth;
    window.handleLogin = handleLogin;
    window.handleSignup = handleSignup;
    window.selectLanguage = selectLanguage;
    window.selectLanguageAndContinue = selectLanguageAndContinue;
    window.toggleFastingMode = toggleFastingMode;
    window.editReading = editReading;
    window.addMedication = addMedication;
    window.showToast = showToast;
    window.showDailyQuote = showDailyQuote;
    window.closeQuote = closeQuote;
</script>
</body>
</html>
