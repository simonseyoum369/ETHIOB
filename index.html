<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
    <title>ETHIOB Diabetes – Full UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, 'Inter', -apple-system, sans-serif;
            background: #c5dce8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app {
            max-width: 440px;
            width: 100%;
            background: #eaf3fa;
            border-radius: 32px;
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            height: 780px;
            display: flex;
            flex-direction: column;
        }
        .app-header {
            background: white;
            padding: 12px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #c5dce8;
            flex-shrink: 0;
        }
        .app-header .logo {
            font-weight: 800;
            font-size: 18px;
            color: #0a5a7a;
        }
        .app-header .lang-toggle {
            background: #c5dce8;
            border: none;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #0a2a3a;
            transition: 0.15s;
            font-family: inherit;
        }
        .app-header .lang-toggle:hover {
            background: #a8c4d4;
        }
        .app-header .lang-toggle.active {
            background: #0a5a7a;
            color: white;
        }
        .app-header .profile-btn {
            background: #0a5a7a;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.15s;
        }
        .app-header .profile-btn:hover {
            background: #084a6a;
            transform: scale(1.05);
        }
        .app-header .right-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .screen {
            flex: 1;
            padding: 16px 20px 20px;
            overflow-y: auto;
            background: #eaf3fa;
        }
        .screen::-webkit-scrollbar {
            width: 4px;
        }
        .screen::-webkit-scrollbar-thumb {
            background: #a8c4d4;
            border-radius: 40px;
        }
        .nav-tabs {
            display: flex;
            gap: 2px;
            background: white;
            padding: 6px 8px;
            border-top: 1px solid #c5dce8;
            justify-content: space-around;
            flex-shrink: 0;
            overflow-x: auto;
        }
        .nav-tab {
            background: none;
            border: none;
            padding: 6px 4px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            color: #5a7a8a;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            transition: 0.15s;
            flex: 1;
            min-width: 36px;
            font-family: inherit;
            white-space: nowrap;
        }
        .nav-tab:hover {
            background: #c5dce8;
            color: #0a3a4a;
        }
        .nav-tab.active {
            color: #0a5a7a;
            background: #c5dce8;
        }
        .nav-tab .icon {
            font-size: 18px;
            line-height: 1;
        }
        .nav-tab .label {
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .card {
            background: white;
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 1px 4px rgba(10, 90, 122, 0.08);
            margin-bottom: 14px;
            border: 1px solid rgba(10, 90, 122, 0.06);
        }
        .card-light {
            background: #f5faff;
            border: 1px solid #c5dce8;
        }
        .flex-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .mt-1 { margin-top: 8px; }
        .mt-2 { margin-top: 14px; }
        .mb-1 { margin-bottom: 8px; }
        .text-muted { color: #5a7a8a; font-size: 14px; }
        .font-bold { font-weight: 700; }
        .badge {
            background: #c5dce8;
            color: #0a4a6a;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }
        .badge-green { background: #d4f0e0; color: #0a6a3a; }
        .badge-yellow { background: #f5edc0; color: #8a7a0a; }
        .badge-red { background: #f5d0d0; color: #8a2a2a; }
        .glucose-input {
            background: white;
            border: 2px solid #c5dce8;
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 16px;
            width: 100%;
            transition: 0.15s;
            font-family: inherit;
            color: #0a2a3a;
        }
        .glucose-input:focus {
            border-color: #0a5a7a;
            outline: none;
            box-shadow: 0 0 0 4px rgba(10, 90, 122, 0.10);
        }
        .glucose-input::placeholder {
            color: #8aabba;
        }
        .btn {
            border: none;
            border-radius: 40px;
            font-weight: 600;
            padding: 12px 20px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            font-family: inherit;
        }
        .btn-primary { background: #0a5a7a; color: white; }
        .btn-primary:hover { background: #084a6a; transform: scale(0.98); }
        .btn-outline { background: transparent; border: 2px solid #0a5a7a; color: #0a5a7a; }
        .btn-outline:hover { background: #c5dce8; }
        .btn-danger { background: #c0392b; color: white; }
        .btn-danger:hover { background: #a93226; }
        .btn-secondary { background: #c5dce8; color: #0a3a4a; }
        .btn-secondary:hover { background: #a8c4d4; }
        .btn-sm { padding: 8px 14px; font-size: 13px; width: auto; }
        .btn-xs { padding: 4px 10px; font-size: 11px; width: auto; }
        .toggle {
            width: 48px;
            height: 28px;
            background: #c8d8e0;
            border-radius: 40px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .toggle.active { background: #0a5a7a; }
        .toggle .dot {
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 40px;
            position: absolute;
            top: 3px;
            left: 3px;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
        }
        .toggle.active .dot { left: 23px; }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 40px;
            display: inline-block;
        }
        .dot-green { background: #27ae60; }
        .dot-yellow { background: #f1c40f; }
        .dot-red { background: #e74c3c; }
        .dot-gray { background: #95a5a6; }
        .pill-day {
            background: white;
            border-radius: 40px;
            padding: 8px 10px;
            text-align: center;
            min-width: 40px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.1s;
            flex: 1;
        }
        .pill-day.active { border-color: #0a5a7a; background: #c5dce8; }
        .pill-day .day-label { font-size: 11px; font-weight: 600; color: #0a2a3a; }
        .pill-day .day-num { font-size: 10px; color: #5a7a8a; }
        .pill-day .day-status { font-size: 10px; margin-top: 2px; }
        .emergency-banner {
            background: #c0392b;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 18px 18px 0 0;
            font-weight: 700;
            letter-spacing: 0.3px;
            font-size: 14px;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            background: #c5dce8;
            color: #5a7a8a;
            border: none;
            font-family: inherit;
            font-size: 14px;
        }
        .auth-tab.active { background: #0a5a7a; color: white; }
        .amharic { font-family: 'Noto Sans Ethiopic', 'Inter', sans-serif; }
        @media (max-width: 480px) {
            .app { border-radius: 20px; height: 100vh; max-height: 800px; }
            .screen { padding: 12px 14px; }
            .nav-tab .label { font-size: 6px; }
        }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a2a3a;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: 0.3s;
            max-width: 90%;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 42, 58, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
            padding: 20px;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-overlay.show .modal-box { transform: scale(1) translateY(0); }
        .modal-box {
            background: white;
            border-radius: 32px;
            max-width: 400px;
            width: 100%;
            padding: 32px 28px 28px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            transform: scale(0.92) translateY(20px);
            transition: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }
        .modal-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #0a5a7a, #0d9488, #27ae60);
        }
        .modal-box .quote-icon { font-size: 48px; margin-bottom: 8px; }
        .modal-box .quote-text { font-size: 18px; font-weight: 600; color: #0a2a3a; line-height: 1.5; margin-bottom: 6px; }
        .modal-box .quote-author { font-size: 14px; color: #5a7a8a; margin-bottom: 16px; font-weight: 500; }
        .modal-box .quote-date { font-size: 12px; color: #8aabba; margin-bottom: 18px; }
        .modal-box .btn { max-width: 200px; margin: 0 auto; }
        .quote-badge {
            background: linear-gradient(135deg, #e8f4fc, #c5dce8);
            border-radius: 40px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #a8c4d4;
            margin-bottom: 12px;
        }
        .quote-badge:hover { transform: scale(1.01); border-color: #0a5a7a; }
        .quote-badge .preview { font-size: 13px; color: #0a2a3a; font-weight: 500; flex:1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .quote-badge .lang-tag { font-size: 10px; background: #0a5a7a; color: white; padding: 2px 10px; border-radius: 40px; font-weight: 700; }
        .reading-row {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #c5dce8;
        }
        .reading-row:last-child { border-bottom: none; }
        .alert-item {
            background: #fef9e7;
            border-left: 4px solid #f1c40f;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .alert-item.danger { background: #fdedec; border-left-color: #e74c3c; }
        .alert-item.success { background: #eafaf1; border-left-color: #27ae60; }
        .food-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #c5dce8;
            font-size: 13px;
        }
        .food-item:last-child { border-bottom: none; }
        .report-preview {
            background: #f5faff;
            border-radius: 12px;
            padding: 12px;
            font-size: 12px;
            color: #3a5a6a;
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .lang-card {
            border: 2px solid #c5dce8;
            border-radius: 16px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.1s;
            background: white;
        }
        .lang-card.selected { border-color: #0a5a7a; background: #c5dce8; }
        .lang-card .check { margin-left: auto; color: #0a5a7a; opacity: 0.3; font-size: 18px; }
        .lang-card.selected .check { opacity: 1; }
        .divider { border: none; border-top: 2px solid #c5dce8; margin: 14px 0; }
        .hidden { display: none !important; }
        .emergency-card-print {
            background: white;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid #c0392b;
        }
        .qr-placeholder {
            width: 80px;
            height: 80px;
            background: repeating-linear-gradient(45deg, #0a2a3a 0px, #0a2a3a 2px, white 2px, white 8px);
            margin: 8px auto;
            border-radius: 8px;
        }
        .medication-brand { font-size: 12px; color: #5a7a8a; }
        .reminder-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #c5dce8;
        }
        .reminder-item:last-child { border-bottom: none; }
        .reminder-time { font-weight: 600; color: #0a2a3a; }
        .reminder-label { color: #3a5a6a; font-size: 14px; }
        .reminder-status { font-size: 12px; font-weight: 600; }
        .reminder-status.done { color: #27ae60; }
        .reminder-status.pending { color: #f1c40f; }
        .reminder-status.missed { color: #e74c3c; }
        .suggestion-list {
            background: white;
            border: 1px solid #c5dce8;
            border-radius: 12px;
            max-height: 120px;
            overflow-y: auto;
            margin-top: 4px;
            display: none;
        }
        .suggestion-list.show { display: block; }
        .suggestion-item {
            padding: 8px 14px;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 1px solid #eaf3fa;
        }
        .suggestion-item:hover { background: #c5dce8; }
        .suggestion-item:last-child { border-bottom: none; }
        .profile-dropdown {
            position: absolute;
            top: 60px;
            right: 16px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            padding: 8px 0;
            min-width: 180px;
            display: none;
            z-index: 100;
            border: 1px solid #c5dce8;
        }
        .profile-dropdown.show { display: block; }
        .profile-dropdown-item {
            padding: 10px 18px;
            cursor: pointer;
            font-size: 14px;
            color: #0a2a3a;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.1s;
        }
        .profile-dropdown-item:hover { background: #c5dce8; }
        .view-selector {
            display: flex;
            gap: 6px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .view-btn {
            padding: 6px 16px;
            border-radius: 40px;
            border: 2px solid #c5dce8;
            background: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: #5a7a8a;
            transition: 0.15s;
            font-family: inherit;
        }
        .view-btn.active { border-color: #0a5a7a; background: #c5dce8; color: #0a5a7a; }
        .view-btn:hover:not(.active) { background: #eaf3fa; }
        .detail-card {
            background: #f5faff;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #c5dce8;
            margin-top: 8px;
        }
        .detail-card .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #e8f0f5;
            font-size: 13px;
        }
        .detail-card .detail-item:last-child { border-bottom: none; }
        .modal-overlay-form {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 42, 58, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
            padding: 20px;
        }
        .modal-overlay-form.show { opacity: 1; pointer-events: auto; }
        .modal-overlay-form .modal-box { max-width: 400px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal-overlay-form .modal-box .form-group { margin-bottom: 12px; }
        .modal-overlay-form .modal-box .form-group label { font-weight: 600; font-size: 13px; color: #0a3a4a; display: block; margin-bottom: 4px; }
        .modal-overlay-form .modal-box .form-group input, .modal-overlay-form .modal-box .form-group select { width: 100%; padding: 10px 14px; border: 2px solid #c5dce8; border-radius: 12px; font-size: 14px; font-family: inherit; background: white; }
        .modal-overlay-form .modal-box .form-group input:focus, .modal-overlay-form .modal-box .form-group select:focus { border-color: #0a5a7a; outline: none; }
        .chart-container {
            height: 120px;
            display: flex;
            align-items: flex-end;
            gap: 6px;
            padding: 8px 0;
            margin-top: 8px;
        }
        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #0a5a7a, #4a9aba);
            border-radius: 4px 4px 0 0;
            min-height: 4px;
            transition: height 0.3s;
            position: relative;
        }
        .chart-bar .bar-label {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: #5a7a8a;
            white-space: nowrap;
        }
        .chart-bar .bar-value {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: #0a2a3a;
            font-weight: 600;
        }
        .chart-container.weekly {
            height: 100px;
        }
        .chart-container.weekly .chart-bar {
            background: linear-gradient(180deg, #27ae60, #5ac88a);
        }
        /* Logging options grid */
        .log-option {
            background: #f5faff;
            border: 2px solid #c5dce8;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.15s;
        }
        .log-option:hover { background: #c5dce8; border-color: #0a5a7a; }
        .log-option .log-time { font-weight: 600; font-size: 14px; color: #0a2a3a; }
        .log-option .log-status { font-size: 12px; color: #5a7a8a; margin-top: 4px; }
        .log-option .log-status.logged { color: #27ae60; }
        .log-option .log-status.missing { color: #e74c3c; }
    </style>
</head>
<body>

<div class="app" id="app">
    <!-- Header -->
    <div class="app-header">
        <span class="logo">🏥 ETHIOB</span>
        <div class="right-group">
            <button class="lang-toggle" id="langToggle" onclick="toggleLanguage()">
                <span id="langIcon">🇬🇧</span> <span id="langLabel">EN</span>
            </button>
            <button class="profile-btn" onclick="toggleProfileDropdown()">👤</button>
        </div>
    </div>

    <!-- Profile Dropdown -->
    <div class="profile-dropdown" id="profileDropdown">
        <div class="profile-dropdown-item" onclick="navigateTo('profile')">👤 Edit Profile</div>
        <div class="profile-dropdown-item" onclick="showToast('🔑 Change password')">🔑 Change Password</div>
        <div class="profile-dropdown-item" onclick="showToast('☁️ Sync settings')">☁️ Sync Settings</div>
        <div class="profile-dropdown-item" onclick="showToast('📊 Export data')">📊 Export Data</div>
        <div class="profile-dropdown-item" style="color:#c0392b;" onclick="handleLogout()">🚪 Logout</div>
    </div>

    <!-- Screen -->
    <div class="screen" id="screenContainer">
        <!-- rendered by JS -->
    </div>

    <!-- Bottom Navigation -->
    <div class="nav-tabs" id="navTabs">
        <button class="nav-tab active" data-tab="home" onclick="navigateTo('home')">
            <span class="icon">🏠</span>
            <span class="label">Home</span>
        </button>
        <button class="nav-tab" data-tab="glucose" onclick="navigateTo('glucose')">
            <span class="icon">📊</span>
            <span class="label">Glucose</span>
        </button>
        <button class="nav-tab" data-tab="bp" onclick="navigateTo('bp')">
            <span class="icon">❤️</span>

    function getReadingsForDate(date) {
        return state.glucoseReadings.filter(r => r.date === date);
    }

    function getDailyAverage(date) {
        const dayReadings = getReadingsForDate(date);
        if (dayReadings.length === 0) return null;
        const sum = dayReadings.reduce((a, b) => a + b.value, 0);
        return Math.round(sum / dayReadings.length);
    }

    function getReading(meal, time, date) {
        const found = state.glucoseReadings.find(r => r.date === date && r.meal === meal && r.time === time);
        return found ? found.value : null;
    }

    function getStatusColor(value, type) {
        if (!value) return '#95a5a6';
        if (type === 'before') {
            if (value < 70) return '#e74c3c';
            if (value <= 130) return '#27ae60';
            if (value <= 180) return '#f1c40f';
            return '#e74c3c';
        } else {
            if (value < 140) return '#27ae60';
            if (value <= 180) return '#f1c40f';
            return '#e74c3c';
        }
    }

    function getStatusLabel(value, type) {
        if (!value) return '—';
        if (type === 'before') {
            if (value < 70) return 'Low';
            if (value <= 130) return 'Normal';
            if (value <= 180) return 'Elevated';
            return 'High';
        } else {
            if (value < 140) return 'Normal';
            if (value <= 180) return 'Elevated';
            return 'High';
        }
    }

    function getBpStatus(systolic, diastolic) {
        if (systolic < 120 && diastolic < 80) return { label: 'Normal', color: '#27ae60', emoji: '✅' };
        if (systolic < 130 && diastolic < 85) return { label: 'Elevated', color: '#f1c40f', emoji: '⬆' };
        if (systolic < 140 && diastolic < 90) return { label: 'High (Stage 1)', color: '#e67e22', emoji: '⚠️' };
        return { label: 'Hypertensive Crisis', color: '#e74c3c', emoji: '🚨' };
    }

    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(el._timeout);
        el._timeout = setTimeout(() => el.classList.remove('show'), 2800);
    }

    function getDailyQuote() {
        const today = new Date().toDateString();
        const seed = today.split(' ').join('').length + new Date().getDate() + new Date().getMonth() * 31;
        return state.quotes[seed % state.quotes.length];
    }

    function showDailyQuote() {
        const modal = document.getElementById('quoteModal');
        const quote = getDailyQuote();
        const isAm = state.lang === 'am';
        document.getElementById('quoteIcon').textContent = quote.icon;
        document.getElementById('quoteText').textContent = `"${isAm ? quote.am.text : quote.en.text}"`;
        document.getElementById('quoteAuthor').textContent = `— ${isAm ? quote.am.author : quote.en.author}`;
        document.getElementById('quoteDate').textContent = `📅 ${new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}`;
        modal.classList.add('show');
        state.quoteShownToday = true;
    }

        document.getElementById('quoteModal').classList.remove('show');

        document.getElementById('profileDropdown').classList.toggle('show');

    }

    // ============================================================
    //  NAVIGATION
    // ============================================================
    function navigateTo(screen) {
        if (!state.isLoggedIn && screen !== 'onboarding' && screen !== 'login' && screen !== 'signup') {
            state.screen = 'onboarding';
            render();
            return;
        }
        state.screen = screen;
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.tab === screen);
        });
        document.getElementById('profileDropdown').classList.remove('show');
        render();
    }

    // ============================================================
    //  RENDER
    // ============================================================
    function render() {
        const container = document.getElementById('screenContainer');
        let html = '';

        if (!state.isLoggedIn) {
            if (state.screen === 'signup') html = renderSignup();
            else if (state.screen === 'login') html = renderLogin();
            else html = renderOnboarding();
            container.innerHTML = `<div class="fade-in">${html}</div>`;
            document.getElementById('navTabs').style.display = 'none';
            return;
        }
        document.getElementById('navTabs').style.display = 'flex';

        switch (state.screen) {
            case 'home': html = renderHome(); break;
            case 'glucose': html = renderGlucose(); break;
            case 'bp': html = renderBp(); break;
            case 'meds': html = renderMeds(); break;
            case 'reminders': html = renderReminders(); break;
            case 'reports': html = renderReports(); break;
            case 'profile': html = renderProfile(); break;
            case 'emergency': html = renderEmergency(); break;
            default: html = renderHome();
        }
        container.innerHTML = `<div class="fade-in">${html}</div>`;

        if (state.isLoggedIn && !state.quoteShownToday) {
            setTimeout(showDailyQuote, 500);
        }

    function showSuggestions() {
        const input = document.getElementById('healthConditionInput');
        const list = document.getElementById('suggestionList');
        const val = input.value.toLowerCase();
        const lastComma = val.lastIndexOf(',');
        const search = lastComma >= 0 ? val.substring(lastComma + 1).trim() : val.trim();
        if (search.length === 0) { list.classList.remove('show'); return; }
        const matches = state.healthConditionSuggestions.filter(s => s.toLowerCase().includes(search));
        if (matches.length === 0) { list.classList.remove('show'); return; }
        list.innerHTML = matches.map(s => `<div class="suggestion-item" onclick="addCondition('${s}')">${s}</div>`).join('');
        list.classList.add('show');
    }

    function addCondition(condition) {
        const input = document.getElementById('healthConditionInput');
        let val = input.value;
        const parts = val.split(',').map(p => p.trim());
        parts.pop();
        parts.push(condition);
        input.value = parts.join(', ');
        document.getElementById('suggestionList').classList.remove('show');
    }

    document.addEventListener('click', function(e) {
        const list = document.getElementById('suggestionList');
        const input = document.getElementById('healthConditionInput');
        if (list && !list.contains(e.target) && e.target !== input) {
            list.classList.remove('show');
        }
    });

    function renderGlucose() {

        }

    function renderGlucoseLoggingOptions() {
        const meals = ['breakfast', 'lunch', 'dinner'];
        const mealLabels = { 'breakfast': 'Breakfast', 'lunch': 'Lunch', 'dinner': 'Dinner' };
        const mealIcons = { 'breakfast': '🍳', 'lunch': '🥗', 'dinner': '🍽️' };
        let html = `<div style="background:#f0f7fe; border-radius:12px; padding:12px; margin-bottom:12px; border:2px solid #0a5a7a;">
            <div style="font-weight:700; margin-bottom:8px;">📝 Select time to log:</div>
            <div class="grid-2">`;

        for (const meal of meals) {
            const before = getReading(meal, 'before', state.today);
            const after = getReading(meal, 'after', state.today);
            const beforeStatus = before !== null ? 'logged' : 'missing';
            const afterStatus = after !== null ? 'logged' : 'missing';

            html += `
                <div class="log-option" onclick="logGlucoseSlot('${meal}','before')">
                    <div class="log-time">${mealIcons[meal]} ${mealLabels[meal]} Before</div>
                    <div class="log-status ${beforeStatus}">${before !== null ? `✅ ${before} mg/dL` : '⬜ Tap to log'}</div>

                <div class="log-option" onclick="logGlucoseSlot('${meal}','after')">
                    <div class="log-time">${mealIcons[meal]} ${mealLabels[meal]} After</div>
                    <div class="log-status ${afterStatus}">${after !== null ? `✅ ${after} mg/dL` : '⬜ Tap to log'}</div>
                </div>
            `;
        }

        html += `</div></div>`;
        return html;
    }

    function logGlucoseSlot(meal, time) {
        const current = getReading(meal, time, state.today);
        const val = prompt(`Enter ${meal} ${time} glucose (mg/dL):`, current || '');
        if (val !== null && !isNaN(val) && val >= 20 && val <= 600) {
            const existing = state.glucoseReadings.find(r => r.date === state.today && r.meal === meal && r.time === time);
            if (existing) existing.value = parseInt(val);
            else state.glucoseReadings.push({ date: state.today, meal, time, value: parseInt(val) });
            showToast('✅ Reading saved!');
            render();
        } else if (val !== null) {
            showToast('⚠️ Enter value 20-600');
        }
    }

        state.glucoseView = view;

        render();

        html += `<div style="font-weight:600; font-size:16px; margin-top:8px;">📅 ${state.today} · Wednesday</div>`;

        meals.forEach(meal => {
            const before = getReading(meal, 'before', state.today);
            const after = getReading(meal, 'after', state.today);
            html += `
                <div class="card" style="margin-top:10px;">
                    <div style="font-weight:700; font-size:15px; margin-bottom:8px;">${mealIcons[meal]} ${mealLabels[meal]}</div>
                    <div class="flex-row" style="gap:8px;">

                            <div style="font-size:10px; color:${getStatusColor(after,'after')};">${after ? getStatusLabel(after,'after') : 'Tap to log'}</div>
