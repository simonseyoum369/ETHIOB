    function _(key, vars = {}) {
        let text = t[state.lang][key] || key;
        for (const [k, v] of Object.entries(vars)) text = text.replace(`{${k}}`, v);
        return text;
    }

    // =====================================================
    //  HELPERS
    // =====================================================
    function getReadingsForDate(date) { return state.readings.filter(r => r.date === date); }

    function getDailyAverage(date) {
        const dayReadings = getReadingsForDate(date);
        if (dayReadings.length === 0) return null;
        const sum = dayReadings.reduce((a, b) => a + b.value, 0);
        return Math.round(sum / dayReadings.length);
    }

    function getReading(meal, time, date) {
        const found = state.readings.find(r => r.date === date && r.meal === meal && r.time === time);
        return found ? found.value : null;
    }

    function getStatusColor(value, type) {
        if (!value) return '#94a3b8';
        if (type === 'before') {
            if (value < 70) return '#ef4444';
            if (value <= 130) return '#10b981';
            if (value <= 180) return '#f59e0b';
            return '#ef4444';
        } else {
            if (value < 140) return '#10b981';
            if (value <= 180) return '#f59e0b';
            return '#ef4444';
        }
    }

    function showToast(message) {
        const el = document.getElementById('toast');
        el.textContent = message;
        el.classList.add('show');
        clearTimeout(el._timeout);
        el._timeout = setTimeout(() => el.classList.remove('show'), 2800);
    }

    // =====================================================
    //  INSULIN CALCULATIONS
    // =====================================================
    function calculateActiveInsulin() {
        const now = Date.now();
        const decayRate = state.insulinState.decayRate;
        let totalActive = 0;
        for (const bolus of state.insulinState.bolusHistory) {
            const hoursElapsed = (now - bolus.timestamp) / (1000 * 60 * 60);
            if (hoursElapsed > 5) continue;
            const active = bolus.units * Math.pow(1 - decayRate, hoursElapsed);
            totalActive += Math.max(0, active);
        }
        state.insulinState.activeInsulin = Math.round(totalActive * 100) / 100;
        return state.insulinState.activeInsulin;
    }

    function calculateBolusDose(carbsGrams, mealType, currentGlucose) {
        const icRatio = state.insulinState.icRatio[mealType] || 0.1;
        const foodDose = carbsGrams * icRatio;
        const correctionDose = (currentGlucose - state.insulinState.targetGlucose) / state.insulinState
        .sensitivityCoefficient;
        const activeInsulin = calculateActiveInsulin();
        const totalDose = Math.max(0, foodDose + correctionDose - activeInsulin);
        return {
            foodDose: Math.round(foodDose * 10) / 10,
            correctionDose: Math.round(Math.max(0, correctionDose) * 10) / 10,
            activeInsulin: activeInsulin,
            totalDose: Math.round(totalDose * 10) / 10,
            icRatio: icRatio,
        };
    }

    function addBolus(units) {
        state.insulinState.bolusHistory.push({ units: units, timestamp: Date.now() });
        calculateActiveInsulin();
        showToast('💉 Bolus of ' + units + ' units recorded');
        render();
    }

    // =====================================================
    //  FOOD ANALYZER
    // =====================================================
    function analyzeFood(foodName, weightGrams) {
        const food = state.foodDB[foodName];
        if (!food) return null;
        const factor = weightGrams / 100;
        return {
            name: foodName,
            weight: weightGrams,
            carbs: Math.round(food.carbs * factor * 10) / 10,
            protein: Math.round(food.protein * factor * 10) / 10,
            fat: Math.round(food.fat * factor * 10) / 10,
            calories: Math.round(food.calories * factor * 10) / 10,
            breadUnits: Math.round((food.carbs * factor / 10) * 10) / 10,
            unit: food.unit,
        };
    }

    function addFoodToLog(foodName, weightGrams) {
        const result = analyzeFood(foodName, weightGrams);
        if (!result) { showToast('⚠️ Food not found'); return; }
        state.macroTracker.dailyIntake.carbohydrates += result.carbs;
        state.macroTracker.dailyIntake.proteins += result.protein;
        state.macroTracker.dailyIntake.fats += result.fat;
        state.macroTracker.dailyIntake.calories += result.calories;
        state.macroTracker.foodLog.push({ ...result, timestamp: Date.now() });
        showToast('🍽️ Added ' + foodName + ' (' + weightGrams + 'g) - ' + result.breadUnits + ' BU');
        render();
    }

    // =====================================================
    //  REPORTS & DOWNLOAD
    // =====================================================
    function generateReport(type) {
        const now = new Date().toLocaleString();
        const report = {
            id: Date.now(),
            type: type,
            generatedAt: now,
            patient: state.user,

            medications: state.medications,

            foodLog: state.macroTracker.foodLog,
            macroIntake: state.macroTracker.dailyIntake,
            macroTargets: state.macroTracker.dailyTargets,
            activeInsulin: calculateActiveInsulin(),
            hba1c: '7.2%',
            summary: {
                totalReadings: state.readings.length,
                avgGlucose: getDailyAverage(state.today) || 0,
                totalMeals: state.readings.filter(r => r.meal).length,
                totalInsulin: state.insulinState.bolusHistory.reduce((s, b) => s + b.units, 0),
                totalFoods: state.macroTracker.foodLog.length,
            }
        };
        state.reports.push(report);
        showToast(_('toast_report_generated'));
        return report;
    }

    function downloadReport(format) {
        const report = generateReport('full');
        let content = '';
        let filename = 'ETHIOB_Report_' + new Date().toISOString().slice(0, 10);

        if (format === 'pdf') {
            content = `ETHIOB Diabetes Report\n`;
            content += `========================\n`;
            content += `Patient: ${report.patient.name}\n`;
            content += `Generated: ${report.generatedAt}\n\n`;
            content += `--- SUMMARY ---\n`;
            content += `Total Readings: ${report.summary.totalReadings}\n`;
            content += `Average Glucose: ${report.summary.avgGlucose} mg/dL\n`;
            content += `Estimated HbA1c: ${report.hba1c}\n`;
            content += `Active Insulin: ${report.activeInsulin} units\n`;
            content += `Total Insulin Used: ${report.summary.totalInsulin} units\n`;
            content += `Total Foods Logged: ${report.summary.totalFoods}\n\n`;
            content += `--- GLUCOSE READINGS ---\n`;
            report.readings.forEach(r => {
                content += `${r.date} - ${r.meal} (${r.time}): ${r.value} mg/dL\n`;
            });
            content += `\n--- MEDICATIONS ---\n`;
            report.medications.forEach(m => {
                content += `${m.name}: ${m.morning || 0}/${m.afternoon || 0}/${m.night || 0} ${m.unit}\n`;
            });
            content += `\n--- INSULIN HISTORY ---\n`;
            report.insulinHistory.forEach(b => {
                content += `${new Date(b.timestamp).toLocaleString()}: ${b.units} units\n`;
            });
            content += `\n--- FOOD LOG ---\n`;
            report.foodLog.forEach(f => {
                content += `${f.name} (${f.weight}g): ${f.carbs}g carbs, ${f.breadUnits} BU, ${f.calories} cal\n`;
            });
            showToast('📄 PDF Report downloaded');
        } else if (format === 'csv') {
            content = 'Date,Meal,Time,Value,Type\n';
            report.readings.forEach(r => {
                content += `${r.date},${r.meal},${r.time},${r.value},Glucose\n`;
            });
            report.foodLog.forEach(f => {
                content += `${new Date(f.timestamp).toLocaleDateString()},${f.name},,${f.carbs},Food\n`;
            });
            report.insulinHistory.forEach(b => {
                content += `${new Date(b.timestamp).toLocaleDateString()},Insulin,,${b.units},Insulin\n`;
            });
            showToast('📊 CSV Report downloaded');
        } else if (format === 'json') {
            content = JSON.stringify(report, null, 2);
            showToast('📋 JSON Report downloaded');
        }

        // Simulate download
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename + '.' + (format === 'pdf' ? 'txt' : format);
        a.click();
        URL.revokeObjectURL(url);
    }

    // =====================================================

    // =====================================================
    function navigateTo(screen) {
        if (!state.isLoggedIn && screen !== 'onboarding' && screen !== 'login' && screen !== 'signup') {
            state.screen = 'onboarding';
            render();
            return;
        }
        state.screen = screen;
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.tab === screen);
        });
        render();
    }

    // =====================================================
    //  RENDER
    // =====================================================
    function render() {
        const container = document.getElementById('screenContainer');
        let html = '';

        if (!state.isLoggedIn) {
            if (state.screen === 'signup') html = renderSignup();
            else if (state.screen === 'login') html = renderLogin();
            else html = renderOnboarding();
            container.innerHTML = `<div class="fade-in">${html}</div>`;
            document.querySelector('.nav-tabs').style.display = 'none';
            return;
        }
        document.querySelector('.nav-tabs').style.display = 'flex';

        switch (state.screen) {
            case 'dashboard':
                html = renderDashboard();
                break;
            case 'tracking':
                html = renderTracking();
                break;
            case 'insulin':
                html = renderInsulinCalculator();
                break;
            case 'food':
                html = renderFoodAnalyzer();
                break;
            case 'reports':
                html = renderReports();
                break;
            case 'profile':
                html = renderProfile();
                break;
            default:
                html = renderDashboard();
        }
        container.innerHTML = `<div class="fade-in">${html}</div>`;
        updateActiveTab();

        if (state.isLoggedIn && !state.quoteShownToday) {
            setTimeout(() => showDailyQuote(), 600);
        }
    }

    function updateActiveTab() {
        document.querySelectorAll('.nav-tab').forEach(tab => {

                <div style="font-size:13px; opacity:0.8;">${getDailyAverage(state.today) ? (getDailyAverage(state.today) <= 130 ? _('excellent') : getDailyAverage(state.today) <= 180 ? _('good') : _('needs_attention')) : 'Log more readings'}</div>
            </div>

            <button class="btn btn-secondary mt-1" onclick="navigateTo('dashboard')">← ${_('back')}</button>
        `;
    }

    function editReading(meal, time) {
        const current = getReading(meal, time, state.today);
        const val = prompt(`Enter ${meal} ${time} glucose (mg/dL):`, current || '');
        if (val !== null && !isNaN(val) && val >= 20 && val <= 600) {
            const existing = state.readings.find(r => r.date === state.today && r.meal === meal && r.time === time);
            if (existing) existing.value = parseInt(val);
            else state.readings.push({ date: state.today, meal, time, value: parseInt(val) });
            showToast(_('toast_reading_saved'));
            render();
        } else if (val !== null) showToast('⚠️ Please enter a value between 20-600 mg/dL');
    }

    // =====================================================
    //  INSULIN CALCULATOR
    // =====================================================
    function renderInsulinCalculator() {
        const mealLabels = { breakfast: _('breakfast'), lunch: _('lunch'), dinner: _('dinner'), snack: 'Snack' };
        const currentGlucose = 185;
        const carbs = 60;
        const mealType = 'breakfast';
        const result = calculateBolusDose(carbs, mealType, currentGlucose);

        return `
            <div style="font-weight:700; font-size:20px;">💉 ${_('bolus_calculator')}</div>
            <div style="color:#64748b; margin-bottom:12px;">${_('ic_ratio')}: ${result.icRatio.toFixed(2)} | Target: ${state.insulinState.targetGlucose} mg/dL</div>

            <div class="card">
                <div class="flex-between"><span style="font-weight:600;">🍽️ Meal: ${mealLabels[mealType]}</span><span class="insulin-badge">IC Ratio: 1:${Math.round(1/result.icRatio)}</span></div>
                <div class="flex-between" style="padding:4px 0; border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">🍞 ${_('food_carbs')}</span><span style="font-weight:700;">${carbs}g (${(carbs/10).toFixed(1)} BU)</span></div>
                <div class="flex-between" style="padding:4px 0; border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">💉 ${_('food_dose')}</span><span style="font-weight:700; color:#0891b2;">${result.foodDose} units</span></div>
                <div class="flex-between" style="padding:4px 0; border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">📈 ${_('current_glucose')}</span><span style="font-weight:700;">${currentGlucose} mg/dL</span></div>
                <div class="flex-between" style="padding:4px 0; border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">🎯 ${_('target_glucose')}</span><span style="font-weight:700;">${state.insulinState.targetGlucose} mg/dL</span></div>
                <div class="flex-between" style="padding:4px 0; border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">💉 ${_('correction_dose')}</span><span style="font-weight:700; color:#f59e0b;">${result.correctionDose} units</span></div>
                <div class="flex-between" style="padding:4px 0; border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">⏱️ ${_('active_insulin')}</span><span style="font-weight:700; color:#ef4444;">${result.activeInsulin.toFixed(2)} units</span></div>
                <div class="flex-between" style="padding:8px 0; margin-top:4px; background:#f0fdfa; border-radius:8px; padding:8px 12px;">
                    <span style="font-weight:700; font-size:16px;">✅ ${_('total_bolus')}</span>
                    <span style="font-weight:800; font-size:22px; color:#0891b2;">${result.totalDose} units</span>
                </div>
            </div>

            <div class="card" style="background:#fef3c7; border-left:4px solid #f59e0b;">
                <div style="font-weight:700;">🔬 ${_('paranormal_mode')}</div>
                <div style="font-size:13px; color:#92400e;">Food weight: 60.00g | Carbs: 60.00g (0.01g accuracy)</div>
            </div>

            <button class="btn btn-primary" onclick="addBolus(${result.totalDose})">💉 ${_('administer')} ${result.totalDose} units</button>
            <button class="btn btn-secondary mt-1" onclick="navigateTo('dashboard')">← ${_('back')}</button>
        `;
    }

    // =====================================================
    //  FOOD ANALYZER (NEW)
    // =====================================================
    function renderFoodAnalyzer() {
        const foodNames = Object.keys(state.foodDB);
        const recentFoods = state.macroTracker.foodLog.slice(-5).reverse();

        return `
            <div style="font-weight:700; font-size:20px;">🍽️ ${_('food_analyzer')}</div>
            <div style="color:#64748b; margin-bottom:12px;">${_('search_food')} or browse categories</div>

            <div class="card">
                <div style="font-weight:600; margin-bottom:8px;">🔍 ${_('search_food')}</div>
                <div class="flex-row" style="gap:8px;">
                    <input class="glucose-input" id="foodSearchInput" type="text" placeholder="Search food..." style="flex:1; padding:10px 14px; font-size:14px;" oninput="filterFoods()" />
                    <button class="btn btn-primary btn-sm" style="width:auto; padding:10px 16px;" onclick="analyzeSelectedFood()">🔬 Analyze</button>
                </div>
                <div id="foodSuggestions" style="margin-top:8px; max-height:120px; overflow-y:auto; display:flex; flex-wrap:wrap; gap:4px;">

                        <span style="background:#f1f5f9; padding:4px 12px; border-radius:40px; font-size:12px; cursor:pointer;" onclick="selectFood('${name}')">${name}</span>
                    `).join('')}
                </div>
            </div>

            <div id="foodResult" class="hidden">
                <div class="card food-analyzer-result">
                    <div style="font-weight:600; margin-bottom:8px;">📊 ${_('nutrition_info')}</div>
                    <div id="foodResultContent"></div>
                    <button class="btn btn-primary btn-sm mt-1" onclick="addAnalyzedFood()" style="width:auto; padding:8px 20px;">➕ ${_('add_med')}</button>
                </div>
            </div>

            <div class="card">
                <div class="flex-between"><span style="font-weight:600;">📋 Recent Foods</span><span style="font-size:12px; color:#94a3b8;">${state.macroTracker.foodLog.length} items</span></div>
                ${recentFoods.length === 0 ? '<div style="color:#94a3b8; font-size:13px; padding:8px 0;">No foods logged yet</div>' :
                recentFoods.map(f => `
                    <div class="food-item">
                        <span>${f.name} (${f.weight}g)</span>
                        <span>${f.carbs}g carbs · ${f.breadUnits} BU · ${f.calories} cal</span>
                    </div>
                `).join('')}
            </div>

            <div class="grid-2" style="margin-top:4px;">
                <button class="btn btn-outline btn-sm" onclick="addFoodToLog('bread',30)">🍞 Bread (30g)</button>
                <button class="btn btn-outline btn-sm" onclick="addFoodToLog('rice',150)">🍚 Rice (150g)</button>
                <button class="btn btn-outline btn-sm" onclick="addFoodToLog('apple',150)">🍎 Apple (150g)</button>
                <button class="btn btn-outline btn-sm" onclick="addFoodToLog('chicken',100)">🍗 Chicken (100g)</button>
            </div>

            <button class="btn btn-secondary mt-1" onclick="navigateTo('dashboard')">← ${_('back')}</button>

    let selectedFood = null;
    let analyzedResult = null;

    window.selectFood = function(name) {
        selectedFood = name;
        document.getElementById('foodSearchInput').value = name;
        analyzeSelectedFood();
    };

    window.filterFoods = function() {
        const input = document.getElementById('foodSearchInput').value.toLowerCase();
        const suggestions = document.getElementById('foodSuggestions');
        const filtered = Object.keys(state.foodDB).filter(f => f.toLowerCase().includes(input));
        suggestions.innerHTML = filtered.slice(0, 12).map(name =>
            `<span style="background:#f1f5f9; padding:4px 12px; border-radius:40px; font-size:12px; cursor:pointer;" onclick="selectFood('${name}')">${name}</span>`
        ).join('') || '<span style="color:#94a3b8; font-size:13px;">No foods found</span>';
    };

    window.analyzeSelectedFood = function() {
        const input = document.getElementById('foodSearchInput').value.trim();
        const foodName = input || selectedFood;
        if (!foodName || !state.foodDB[foodName]) {
            showToast('⚠️ Please select a valid food');
            return;
        }
        const weight = prompt('Enter weight in grams:', '100');
        if (!weight || isNaN(weight) || weight <= 0) return;
        const result = analyzeFood(foodName, parseFloat(weight));
        if (!result) { showToast('⚠️ Food not found'); return; }
        analyzedResult = result;
        const content = document.getElementById('foodResultContent');
        content.innerHTML = `
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                <div><span style="color:#64748b;">${_('total_carbs')}</span><br><span style="font-weight:700; font-size:18px;">${result.carbs}g</span></div>
                <div><span style="color:#64748b;">${_('total_protein')}</span><br><span style="font-weight:700; font-size:18px;">${result.protein}g</span></div>
                <div><span style="color:#64748b;">${_('total_fat')}</span><br><span style="font-weight:700; font-size:18px;">${result.fat}g</span></div>
                <div><span style="color:#64748b;">${_('total_calories')}</span><br><span style="font-weight:700; font-size:18px;">${result.calories} kcal</span></div>
            </div>
            <div style="margin-top:8px; background:#f0fdfa; padding:8px; border-radius:8px;">
                <span style="color:#64748b;">🍞 ${_('bread_units_label')}</span>
                <span style="font-weight:700; font-size:18px; color:#0891b2;">${result.breadUnits} BU</span>
                <span style="font-size:12px; color:#94a3b8; margin-left:8px;">${result.weight}g · ${result.unit || 'serving'}</span>
            </div>
        `;
        document.getElementById('foodResult').classList.remove('hidden');
    };

    window.addAnalyzedFood = function() {
        if (!analyzedResult) return;
        addFoodToLog(analyzedResult.name, analyzedResult.weight);
        document.getElementById('foodResult').classList.add('hidden');
        analyzedResult = null;
    };

    // =====================================================
    //  REPORTS & DOWNLOAD (NEW)
    // =====================================================
    function renderReports() {
        const reports = state.reports;

        return `
            <div style="font-weight:700; font-size:20px;">📄 ${_('reports_title')}</div>
            <div style="color:#64748b; margin-bottom:12px;">${_('generate_report')} or download your data</div>

            <div class="card" style="background:linear-gradient(135deg,#0891b2,#0d9488); color:white;">
                <div style="font-weight:700;">✨ ${_('generate_report')}</div>
                <div style="font-size:13px; opacity:0.9;">Create comprehensive report for your doctor</div>
                <div class="grid-3" style="margin-top:10px;">
                    <div style="background:rgba(255,255,255,0.15); padding:10px; border-radius:12px; text-align:center; cursor:pointer;" onclick="downloadReport('pdf')">📄 ${_('pdf')}</div>
                    <div style="background:rgba(255,255,255,0.15); padding:10px; border-radius:12px; text-align:center; cursor:pointer;" onclick="downloadReport('csv')">📊 ${_('csv')}</div>
                    <div style="background:rgba(255,255,255,0.15); padding:10px; border-radius:12px; text-align:center; cursor:pointer;" onclick="downloadReport('json')">📋 JSON</div>

            <div class="card">
                <div style="font-weight:600; margin-bottom:8px;">📊 ${_('report_summary')}</div>
                <div class="grid-2" style="font-size:13px;">
                    <div><span style="color:#64748b;">${_('avg_glucose')}</span><br><span style="font-weight:700;">${getDailyAverage(state.today) || 0} mg/dL</span></div>
                    <div><span style="color:#64748b;">${_('est_hba1c')}</span><br><span style="font-weight:700;">7.2%</span></div>
                    <div><span style="color:#64748b;">${_('active_insulin')}</span><br><span style="font-weight:700;">${calculateActiveInsulin().toFixed(1)} units</span></div>
                    <div><span style="color:#64748b;">${_('bread_units_label')}</span><br><span style="font-weight:700;">${(state.macroTracker.dailyIntake.carbohydrates/10).toFixed(1)} BU</span></div>
                </div>
            </div>

            <div class="card">
                <div style="font-weight:600; margin-bottom:8px;">📋 ${_('report_glucose')}</div>
                <div class="report-preview">
                    ${state.readings.slice(-5).map(r => `${r.date} ${r.meal} (${r.time}): ${r.value} mg/dL`).join('\n') || 'No readings yet'}
                </div>
            </div>

            <div class="card">
                <div style="font-weight:600; margin-bottom:8px;">💊 ${_('report_medications')}</div>
                <div class="report-preview">
                    ${state.medications.map(m => `${m.name}: ${m.morning||0}/${m.afternoon||0}/${m.night||0} ${m.unit}`).join('\n') || 'No medications'}
                </div>
            </div>

            <div class="card">
                <div style="font-weight:600; margin-bottom:8px;">🍽️ ${_('report_food')}</div>
                <div class="report-preview">
                    ${state.macroTracker.foodLog.slice(-3).map(f => `${f.name} (${f.weight}g): ${f.carbs}g carbs, ${f.breadUnits} BU`).join('\n') || 'No foods logged'}
                </div>
            </div>

            ${reports.length > 0 ? `
                <div class="card">
                    <div style="font-weight:600; margin-bottom:8px;">📁 ${_('view')} (${reports.length})</div>
                    ${reports.slice(-3).reverse().map(r => `
                        <div class="food-item">
                            <span>${r.type} - ${new Date(r.id).toLocaleDateString()}</span>
                            <span style="font-size:12px; color:#94a3b8;">${r.summary.totalReadings} readings</span>
                        </div>
                    `).join('')}
                </div>
            ` : ''}

            <button class="btn btn-secondary mt-1" onclick="navigateTo('dashboard')">← ${_('back')}</button>
        `;
    }

    // =====================================================
    //  EMERGENCY
    // =====================================================
    function renderEmergency() {
        const u = state.user;
        const sorted = [...state.readings].sort((a, b) => b.date.localeCompare(a.date) || (a.time === 'after' ? 1 : -1));
        const latest = sorted.slice(0, 4);

        return `
            <div class="emergency-banner">🚨 ${_('emergency_title')}</div>
            <div class="card" style="border-radius:0 0 18px 18px; margin-top:0;">
                <div style="text-align:center;">
                    <div style="font-size:44px;">👤</div>
                    <div style="font-weight:800; font-size:22px;">${u.name}</div>
                    <div style="background:#fee2e2; color:#dc2626; display:inline-block; padding:2px 16px; border-radius:40px; font-weight:600; font-size:13px;">🩸 ${u.diabetesType}</div>
                    <div style="color:#64748b; font-size:13px;">Since ${u.diagnosisDate}</div>

                <div class="grid-2" style="margin:12px 0;">

                    <div style="background:#f8fafc; padding:12px; border-radius:12px;"><div style="color:#64748b; font-size:11px;">🏥 ${_('hospital')}</div><div style="font-weight:700;">${u.hospital}</div></div>
                    <div style="background:#f8fafc; padding:12px; border-radius:12px;"><div style="color:#64748b; font-size:11px;">👨‍⚕️ ${_('specialist')}</div><div style="font-weight:700;">${u.specialist}</div></div>
                    <div style="background:#f8fafc; padding:12px; border-radius:12px;"><div style="color:#64748b; font-size:11px;">📞 ${_('specialist')}</div><div style="font-weight:700;">${u.specialistPhone}</div></div>
                </div>
                <div style="background:#f1f5f9; border-radius:12px; padding:12px; margin:12px 0;">
                    <div style="font-weight:700; font-size:13px;">📞 ${_('emergency_contact')}</div>
                    <div class="flex-between"><span>${u.emergencyName} (${u.relation})</span><span style="font-weight:600;">${u.emergencyPhone}</span></div>
                </div>
                <div style="background:#fef3c7; border-left:4px solid #f59e0b; padding:12px; border-radius:8px; margin:12px 0;">
                    <div style="font-size:13px; color:#92400e; font-weight:700;">⚠️ ${_('latest_readings')}</div>
                    ${latest.map(r => `<div class="flex-between" style="font-size:13px; padding:4px 0; border-bottom:1px solid #fde68a;"><span>${r.date} ${r.meal} ${r.time}</span><span style="font-weight:700; color:${getStatusColor(r.value, r.time)};">${r.value} mg/dL</span></div>`).join('')}

                <div class="flex-row" style="gap:8px; margin-top:8px;">
                    <button class="btn btn-danger" style="flex:1; padding:12px;" onclick="showToast(_('toast_emergency_called'))">📞 ${_('call')}</button>
                    <button class="btn btn-primary" style="flex:1; padding:12px;" onclick="showToast(_('toast_emergency_shared'))">📤 ${_('share')}</button>
                </div>
            </div>
        `;
    }

    // =====================================================
    //  PROFILE
    // =====================================================
    function renderProfile() {
        const u = state.user;
        return `
            <div style="display:flex; align-items:center; gap:14px; margin-bottom:14px;">
                <div style="width:64px; height:64px; background:linear-gradient(135deg,#0891b2,#0d9488); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px;">👤</div>
                <div><div style="font-weight:800; font-size:20px;">${u.name}</div><div style="color:#475569; font-size:14px;">${u.email}</div><div style="background:#f0fdfa; color:#0891b2; padding:2px 12px; border-radius:40px; font-size:11px; font-weight:600; display:inline-block; margin-top:2px;">🩸 ${u.diabetesType} • Since 2018</div></div>
            </div>
            <div class="card"><div class="flex-between"><span style="font-weight:700;">🏥 ${_('medical_info')}</span><span style="color:#0891b2; font-weight:600; cursor:pointer;" onclick="showToast('✏️ Edit mode opened')">${_('edit')}</span></div>
                <div class="flex-between" style="padding:6px 0; border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">🩸 ${_('diabetes_type')}</span><span style="font-weight:600;">${u.diabetesType}</span></div>
                <div class="flex-between" style="padding:6px 0; border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">📅 ${_('diagnosis_date')}</span><span style="font-weight:600;">${u.diagnosisDate}</span></div>
                <div class="flex-between" style="padding:6px 0; border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">🩸 ${_('blood_group')}</span><span style="font-weight:600;">${u.bloodGroup}</span></div>
                <div class="flex-between" style="padding:6px 0;"><span style="color:#64748b;">🏥 ${_('hospital')}</span><span style="font-weight:600;">${u.hospital}</span></div>
            </div>
            <div class="card"><div class="flex-between"><span style="font-weight:700;">📞 ${_('emergency_contact_label')}</span><span style="color:#0891b2; font-weight:600; cursor:pointer;" onclick="showToast('✏️ Edit emergency contact')">${_('edit')}</span></div>
                <div class="flex-between" style="padding:6px 0;"><span style="color:#64748b;">👤 ${u.emergencyName}</span><span style="font-weight:600;">${u.emergencyPhone}</span></div>
                <div style="color:#64748b; font-size:13px;">${u.relation} • ${u.emergencyAddress}</div>
            </div>
            <div class="card"><div style="font-weight:700;">⚙️ ${_('settings')}</div>
                <div class="flex-between" style="padding:6px 0;"><span>🌐 ${_('language')}</span><span style="color:#0891b2; font-weight:500; cursor:pointer;" onclick="toggleLanguage()">${state.lang === 'en' ? 'English 🇬🇧' : 'አማርኛ 🇪🇹'}</span></div>
                <div class="flex-between" style="padding:6px 0;"><span>🔔 ${_('notifications')}</span><div class="toggle active" onclick="this.classList.toggle('active')"><div class="dot"></div></div></div>
                <div class="flex-between" style="padding:6px 0;"><span>☁️ ${_('cloud_sync')}</span><div class="toggle active" onclick="this.classList.toggle('active')"><div class="dot"></div></div></div>
            </div>
            <button class="btn btn-secondary mt-1" onclick="navigateTo('dashboard')">← ${_('back')}</button>
        `;
    }

    // =====================================================
    //  EXPOSE GLOBALS
    // =====================================================
    window.navigateTo = navigateTo;
    window.toggleLanguage = toggleLanguage;
    window.switchAuth = switchAuth;
    window.handleLogin = handleLogin;
    window.handleSignup = handleSignup;
    window.selectLanguage = selectLanguage;
    window.selectLanguageAndContinue = selectLanguageAndContinue;
    window.showToast = showToast;
    window.showDailyQuote = showDailyQuote;
    window.closeQuote = closeQuote;
    window.toggleCGM = toggleCGM;
    window.addBolus = addBolus;
    window.addFoodToLog = addFoodToLog;
    window.analyzeFood = analyzeFood;
    window.selectFood = selectFood;
    window.filterFoods = filterFoods;
    window.analyzeSelectedFood = analyzeSelectedFood;
    window.addAnalyzedFood = addAnalyzedFood;
    window.downloadReport = downloadReport;
    window.generateReport = generateReport;

    // =====================================================
    //  INIT
    // =====================================================
    render();
</script>
