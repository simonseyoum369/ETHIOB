    function renderGlucoseWeek() {
        const days = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().slice(0,10);
            const avg = getDailyAverage(dateStr);
            days.push({ date: dateStr, avg: avg, label: d.toLocaleDateString('en-US', { weekday: 'short' }) });
        }

        const maxVal = Math.max(...days.map(d => d.avg || 0), 180);
        let html = `
            <div style="font-weight:600; font-size:14px; margin-bottom:8px;">📊 Weekly Overview</div>
            <div class="card-light" style="padding:12px; border-radius:12px;">
                <div class="chart-container weekly">
                    ${days.map(d => {
                        const height = d.avg ? (d.avg / maxVal) * 100 : 10;
                        const color = d.avg ? (d.avg <= 130 ? '#27ae60' : d.avg <= 180 ? '#f1c40f' : '#e74c3c') : '#95a5a6';
                        return `<div class="chart-bar" style="height:${Math.max(height, 8)}%; background:${color}; cursor:pointer;" onclick="drillToGlucoseDay('${d.date}')">
                            <div class="bar-value">${d.avg || '—'}</div>
                            <div class="bar-label">${d.label}</div>
                        </div>`;
                    }).join('')}
                </div>
                <div style="font-size:11px; color:#5a7a8a; text-align:center; margin-top:4px;">Click a bar to view that day's details</div>
            </div>
        `;

        if (state.glucoseDrill === 'day' && state.selectedGlucoseDay) {
            const dayReadings = getReadingsForDate(state.selectedGlucoseDay);
            html += `
                <div class="detail-card">
                    <div style="font-weight:600; margin-bottom:6px;">📅 ${state.selectedGlucoseDay}</div>
                    ${dayReadings.length === 0 ? '<div style="color:#8aabba;">No readings for this day</div>' :
                    dayReadings.map(r => `
                        <div class="detail-item">
                            <span>${r.meal} ${r.time}</span>
                            <span style="font-weight:600; color:${getStatusColor(r.value, r.time)};">${r.value} mg/dL</span>
                            <span style="font-size:11px; color:${getStatusColor(r.value, r.time)};">${getStatusLabel(r.value, r.time)}</span>
                        </div>
                    `).join('')}
                    <div style="margin-top:4px; font-weight:600;">Daily Average: ${getDailyAverage(state.selectedGlucoseDay) || '—'} mg/dL</div>
                    <button class="btn btn-secondary btn-sm mt-1" onclick="state.glucoseDrill=null; state.selectedGlucoseDay=null; render();" style="width:auto; padding:4px 12px; font-size:11px;">← Back to week</button>
                </div>
            `;
        }

        const validAvgs = days.map(d => d.avg).filter(a => a !== null);
        const weeklyAvg = validAvgs.length > 0 ? Math.round(validAvgs.reduce((a,b) => a+b, 0) / validAvgs.length) : null;
        html += `
            <div class="card" style="background:linear-gradient(135deg,#0a5a7a,#0d9488); color:white; margin-top:8px;">
                <div style="font-size:13px; opacity:0.9;">Weekly Average</div>
                <div style="font-size:28px; font-weight:800;">${weeklyAvg || '—'} mg/dL</div>
                <div style="font-size:13px; opacity:0.8;">${weeklyAvg ? (weeklyAvg <= 130 ? '✨ Excellent' : weeklyAvg <= 180 ? '👍 Good' : '⚠️ Needs Attention') : 'Log more readings'}</div>
            </div>
        `;

        return html;
    }

    function drillToGlucoseDay(date) {
        state.glucoseDrill = 'day';
        state.selectedGlucoseDay = date;
        render();
    }

    function renderGlucoseMonth() {
        const weeks = [];
        for (let i = 11; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - (i * 7));
            const dateStr = d.toISOString().slice(0,10);
            const avg = getDailyAverage(dateStr);
            weeks.push({ week: 12 - i, avg: avg, label: `W${12-i}` });
        }

        const validAvgs = weeks.map(w => w.avg).filter(a => a !== null);
        const avg2Month = validAvgs.slice(0, 8).length > 0 ? Math.round(validAvgs.slice(0, 8).reduce((a,b) => a+b, 0) / validAvgs.slice(0, 8).length) : null;
        const avg3Month = validAvgs.length > 0 ? Math.round(validAvgs.reduce((a,b) => a+b, 0) / validAvgs.length) : null;

        const hba1c2 = avg2Month ? ((avg2Month + 46.7) / 28.7).toFixed(1) : null;
        const hba1c3 = avg3Month ? ((avg3Month + 46.7) / 28.7).toFixed(1) : null;

        let html = `
            <div style="font-weight:600; font-size:14px; margin-bottom:8px;">📈 HbA1c Estimation</div>
            <div class="grid-2" style="margin-bottom:10px;">
                <div class="card" style="background:#f5faff; border:1px solid #c5dce8; text-align:center; padding:12px;">
                    <div style="font-size:11px; color:#5a7a8a;">2-Month (8 weeks)</div>
                    <div style="font-size:28px; font-weight:800;">${hba1c2 || '—'}%</div>
                    <div style="font-size:12px; color:${hba1c2 ? (parseFloat(hba1c2) < 7 ? '#27ae60' : parseFloat(hba1c2) < 8 ? '#f1c40f' : '#e74c3c') : '#95a5a6'};">${hba1c2 ? (parseFloat(hba1c2) < 7 ? '✅ Managed' : parseFloat(hba1c2) < 8 ? '⚠️ Needs Improvement' : '🔴 High') : 'Insufficient data'}</div>
                </div>
                <div class="card" style="background:#f5faff; border:1px solid #c5dce8; text-align:center; padding:12px;">
                    <div style="font-size:11px; color:#5a7a8a;">3-Month (12 weeks)</div>
                    <div style="font-size:28px; font-weight:800;">${hba1c3 || '—'}%</div>
                    <div style="font-size:12px; color:${hba1c3 ? (parseFloat(hba1c3) < 7 ? '#27ae60' : parseFloat(hba1c3) < 8 ? '#f1c40f' : '#e74c3c') : '#95a5a6'};">${hba1c3 ? (parseFloat(hba1c3) < 7 ? '✅ Managed' : parseFloat(hba1c3) < 8 ? '⚠️ Needs Improvement' : '🔴 High') : 'Insufficient data'}</div>
                </div>
            </div>
        `;

        const maxVal = Math.max(...weeks.map(w => w.avg || 0), 180);
        html += `
            <div class="card-light" style="padding:12px; border-radius:12px;">
                <div style="font-weight:600; font-size:13px; margin-bottom:4px;">📊 12-Week Trend</div>
                <div class="chart-container weekly">
                    ${weeks.map(w => {
                        const height = w.avg ? (w.avg / maxVal) * 100 : 10;
                        const color = w.avg ? (w.avg <= 130 ? '#27ae60' : w.avg <= 180 ? '#f1c40f' : '#e74c3c') : '#95a5a6';
                        return `<div class="chart-bar" style="height:${Math.max(height, 8)}%; background:${color};">
                            <div class="bar-value">${w.avg || '—'}</div>
                            <div class="bar-label">${w.label}</div>
                        </div>`;
                    }).join('')}
                </div>
            </div>
        `;

        html += `
            <div class="card" style="margin-top:8px; padding:12px;">
                <div style="font-weight:600; font-size:13px; margin-bottom:6px;">📋 Reference Range (ADA)</div>
                <div style="font-size:12px;">
                    <div class="flex-between" style="padding:4px 0; border-bottom:1px solid #c5dce8;"><span><span class="status-dot dot-green"></span> Normal</span><span>< 5.7%</span><span>< 117 mg/dL</span></div>
                    <div class="flex-between" style="padding:4px 0; border-bottom:1px solid #c5dce8;"><span><span class="status-dot dot-yellow"></span> Pre-diabetes</span><span>5.7–6.4%</span><span>117–137</span></div>
                    <div class="flex-between" style="padding:4px 0; border-bottom:1px solid #c5dce8;"><span><span class="status-dot" style="background:#f1c40f;"></span> Diabetes (Managed)</span><span>6.5–7.9%</span><span>140–180</span></div>
                    <div class="flex-between" style="padding:4px 0; border-bottom:1px solid #c5dce8;"><span><span class="status-dot dot-red"></span> High Risk</span><span>8.0–9.9%</span><span>183–240</span></div>
                    <div class="flex-between" style="padding:4px 0;"><span><span class="status-dot" style="background:#8a2a2a;"></span> Dangerous</span><span>≥10.0%</span><span>≥240</span></div>
                </div>
            </div>
        `;

        return html;
    }

    // ============================================================
    //  BP LOGS with logging options
    // ============================================================
    function renderBp() {
        const view = state.bpView;
        let html = '';

        html += `<div class="flex-between"><span style="font-weight:700; font-size:18px;">❤️ Blood Pressure</span>
                <span style="color:#0a5a7a; font-size:13px;">${state.today}</span></div>`;

        // If we came from Home with auto-logging, show the logging options prominently
        if (state.bpLogTarget === 'auto') {
            html += renderBpLoggingOptions();
            state.bpLogTarget = null;
        }

        html += `<div class="view-selector">
            <button class="view-btn ${view === 'day' ? 'active' : ''}" onclick="setBpView('day')">📅 Day</button>
            <button class="view-btn ${view === 'week' ? 'active' : ''}" onclick="setBpView('week')">📊 Week</button>
            <button class="view-btn ${view === 'month' ? 'active' : ''}" onclick="setBpView('month')">📈 Month</button>
        </div>`;

        if (view === 'day') {
            html += renderBpDay();
        } else if (view === 'week') {
            html += renderBpWeek();
        } else if (view === 'month') {
            html += renderBpMonth();
        }

        return html;
    }

    function renderBpLoggingOptions() {
        // Check if morning and evening are logged for today
        const morning = state.bpReadings.find(r => r.date === state.today && r.time.includes('AM'));
        const evening = state.bpReadings.find(r => r.date === state.today && r.time.includes('PM'));

        let html = `<div style="background:#f0f7fe; border-radius:12px; padding:12px; margin-bottom:12px; border:2px solid #0a5a7a;">
            <div style="font-weight:700; margin-bottom:8px;">📝 Select time to log:</div>
            <div class="grid-2">
                <div class="log-option" onclick="logBpSlot('morning')">
                    <div class="log-time">🌅 Morning</div>
                    <div class="log-status ${morning ? 'logged' : 'missing'}">${morning ? `✅ ${morning.systolic}/${morning.diastolic}` : '⬜ Tap to log'}</div>
                </div>
                <div class="log-option" onclick="logBpSlot('evening')">
                    <div class="log-time">🌙 Evening</div>
                    <div class="log-status ${evening ? 'logged' : 'missing'}">${evening ? `✅ ${evening.systolic}/${evening.diastolic}` : '⬜ Tap to log'}</div>
                </div>
            </div>
        </div>`;
        return html;
    }

    function logBpSlot(slot) {
        const isMorning = slot === 'morning';
        const existing = state.bpReadings.find(r => r.date === state.today && (isMorning ? r.time.includes('AM') : r.time.includes('PM')));
        const sys = prompt(`Enter systolic (top number) for ${isMorning ? 'Morning' : 'Evening'}:`, existing ? existing.systolic : '120');
        if (sys === null) return;
        const dia = prompt(`Enter diastolic (bottom number) for ${isMorning ? 'Morning' : 'Evening'}:`, existing ? existing.diastolic : '80');
        if (dia === null) return;
        const s = parseInt(sys), d = parseInt(dia);
        if (isNaN(s) || isNaN(d) || s<50 || s>250 || d<30 || d>150) {
            showToast('⚠️ Enter valid BP values');
            return;
        }
        const timeStr = isMorning ? '7:00 AM' : '8:00 PM';
        if (existing) {
            existing.systolic = s;
            existing.diastolic = d;
            existing.time = timeStr;
        } else {
            state.bpReadings.push({ date: state.today, time: timeStr, systolic: s, diastolic: d });
        }
        showToast('❤️ BP logged');
        render();
    }

    function setBpView(view) {
        state.bpView = view;
        state.bpDrill = null;
        render();
    }

    function renderBpDay() {
        const todayReadings = state.bpReadings.filter(r => r.date === state.today);
        let avgSys = null, avgDia = null;
        if (todayReadings.length > 0) {
            const sumSys = todayReadings.reduce((a,b) => a + b.systolic, 0);
            const sumDia = todayReadings.reduce((a,b) => a + b.diastolic, 0);
            avgSys = Math.round(sumSys / todayReadings.length);
            avgDia = Math.round(sumDia / todayReadings.length);
        }

        // Show quick log buttons
        let html = `<div style="display:flex; gap:6px; margin:8px 0;">
            <button class="btn btn-sm btn-outline" style="flex:1;" onclick="logBpSlot('morning')">🌅 Morning</button>
            <button class="btn btn-sm btn-outline" style="flex:1;" onclick="logBpSlot('evening')">🌙 Evening</button>
        </div>`;

        if (todayReadings.length === 0) {
            html += '<div style="color:#8aabba; font-size:14px; margin:8px 0;">No BP readings today</div>';
        } else {
            const maxVal = Math.max(...todayReadings.map(r => r.systolic), 160);
            html += `<div class="card-light" style="padding:12px; border-radius:12px;">
                <div style="font-weight:600; font-size:13px; margin-bottom:4px;">📊 Today's BP</div>
                <div class="chart-container">
                    ${todayReadings.map(r => {
                        const height = (r.systolic / maxVal) * 100;
                        const status = getBpStatus(r.systolic, r.diastolic);
                        return `<div class="chart-bar" style="height:${Math.max(height, 10)}%; background:${status.color};">
                            <div class="bar-value">${r.systolic}/${r.diastolic}</div>
                            <div class="bar-label">${r.time}</div>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
        }

        todayReadings.forEach(r => {
            const status = getBpStatus(r.systolic, r.diastolic);
            html += `
                <div class="flex-between" style="padding:6px 0; border-bottom:1px solid #c5dce8;">
                    <span>${r.time}</span>
                    <span style="font-weight:700;">${r.systolic}/${r.diastolic}</span>
                    <span style="color:${status.color};">${status.emoji} ${status.label}</span>
                </div>
            `;
        });

        html += `
            <div class="card" style="background:linear-gradient(135deg,#0a5a7a,#0d9488); color:white; margin-top:8px;">
                <div style="font-size:13px; opacity:0.9;">Daily Average</div>
                <div style="font-size:28px; font-weight:800;">${avgSys !== null ? `${avgSys}/${avgDia}` : '—'}</div>
                <div style="font-size:13px; opacity:0.8;">${avgSys !== null ? getBpStatus(avgSys, avgDia).label : 'Log readings'}</div>
            </div>
        `;

        return html;
    }

    function renderBpWeek() {
        const days = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().slice(0,10);
            const dayReadings = state.bpReadings.filter(r => r.date === dateStr);
            let avgSys = null, avgDia = null;
            if (dayReadings.length > 0) {
                avgSys = Math.round(dayReadings.reduce((a,b) => a + b.systolic, 0) / dayReadings.length);
                avgDia = Math.round(dayReadings.reduce((a,b) => a + b.diastolic, 0) / dayReadings.length);
            }
            days.push({ date: dateStr, avgSys, avgDia, label: d.toLocaleDateString('en-US', { weekday: 'short' }) });
        }

        const maxVal = Math.max(...days.map(d => d.avgSys || 0), 160);
        let html = `
            <div style="font-weight:600; font-size:14px; margin-bottom:8px;">📊 Weekly BP Overview</div>
            <div class="card-light" style="padding:12px; border-radius:12px;">
                <div class="chart-container weekly">
                    ${days.map(d => {
                        const height = d.avgSys ? (d.avgSys / maxVal) * 100 : 10;
                        const color = d.avgSys ? (d.avgSys < 120 ? '#27ae60' : d.avgSys < 130 ? '#f1c40f' : '#e74c3c') : '#95a5a6';
                        return `<div class="chart-bar" style="height:${Math.max(height, 8)}%; background:${color}; cursor:pointer;" onclick="drillToBpDay('${d.date}')">
                            <div class="bar-value">${d.avgSys ? `${d.avgSys}/${d.avgDia}` : '—'}</div>
                            <div class="bar-label">${d.label}</div>
                        </div>`;
                    }).join('')}
                </div>
                <div style="font-size:11px; color:#5a7a8a; text-align:center; margin-top:4px;">Click a bar to view that day's details</div>
            </div>
        `;

        if (state.bpDrill === 'day' && state.selectedBpDay) {
            const dayReadings = state.bpReadings.filter(r => r.date === state.selectedBpDay);
            html += `
                <div class="detail-card">
                    <div style="font-weight:600; margin-bottom:6px;">📅 ${state.selectedBpDay}</div>
                    ${dayReadings.length === 0 ? '<div style="color:#8aabba;">No BP readings for this day</div>' :
                    dayReadings.map(r => {
                        const status = getBpStatus(r.systolic, r.diastolic);
                        return `<div class="detail-item">
                            <span>${r.time}</span>
                            <span style="font-weight:600;">${r.systolic}/${r.diastolic}</span>
                            <span style="color:${status.color};">${status.label}</span>
                        </div>`;
                    }).join('')}
                    <button class="btn btn-secondary btn-sm mt-1" onclick="state.bpDrill=null; state.selectedBpDay=null; render();" style="width:auto; padding:4px 12px; font-size:11px;">← Back to week</button>
                </div>
            `;
        }

        const validWeeks = days.filter(d => d.avgSys !== null);
        let avgSys = null, avgDia = null;
        if (validWeeks.length > 0) {
            avgSys = Math.round(validWeeks.reduce((a,b) => a + b.avgSys, 0) / validWeeks.length);
            avgDia = Math.round(validWeeks.reduce((a,b) => a + b.avgDia, 0) / validWeeks.length);
        }
        html += `
            <div class="card" style="background:linear-gradient(135deg,#0a5a7a,#0d9488); color:white; margin-top:8px;">
                <div style="font-size:13px; opacity:0.9;">Weekly Average</div>
                <div style="font-size:28px; font-weight:800;">${avgSys !== null ? `${avgSys}/${avgDia}` : '—'}</div>
                <div style="font-size:13px; opacity:0.8;">${avgSys !== null ? getBpStatus(avgSys, avgDia).label : 'Log readings'}</div>
            </div>
        `;

        return html;
    }

    function drillToBpDay(date) {
        state.bpDrill = 'day';
        state.selectedBpDay = date;
        render();
    }

    function renderBpMonth() {
        const weeks = [];
        for (let i = 3; i >= 0; i--) {
            const weekStart = new Date();
            weekStart.setDate(weekStart.getDate() - (i * 7));
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);
            const readings = state.bpReadings.filter(r => {
                const d = new Date(r.date);
                return d >= weekStart && d <= weekEnd;
            });
            let avgSys = null, avgDia = null;
            if (readings.length > 0) {
                avgSys = Math.round(readings.reduce((a,b) => a + b.systolic, 0) / readings.length);
                avgDia = Math.round(readings.reduce((a,b) => a + b.diastolic, 0) / readings.length);
            }
            weeks.push({ label: `W${4-i}`, avgSys, avgDia });
        }

        const maxVal = Math.max(...weeks.map(w => w.avgSys || 0), 160);
        let html = `
            <div style="font-weight:600; font-size:14px; margin-bottom:8px;">📊 Monthly BP Overview</div>
            <div class="card-light" style="padding:12px; border-radius:12px;">
                <div class="chart-container weekly">
                    ${weeks.map(w => {
                        const height = w.avgSys ? (w.avgSys / maxVal) * 100 : 10;
                        const color = w.avgSys ? (w.avgSys < 120 ? '#27ae60' : w.avgSys < 130 ? '#f1c40f' : '#e74c3c') : '#95a5a6';
                        return `<div class="chart-bar" style="height:${Math.max(height, 8)}%; background:${color};">
                            <div class="bar-value">${w.avgSys ? `${w.avgSys}/${w.avgDia}` : '—'}</div>
                            <div class="bar-label">${w.label}</div>
                        </div>`;
                    }).join('')}
                </div>
            </div>
        `;

        html += `
            <div style="font-size:12px; color:#5a7a8a; text-align:center; margin:4px 0;">Tap a week bar to see details</div>
            <div style="display:flex; gap:6px; flex-wrap:wrap;">
                ${weeks.map((w, i) => `
                    <button class="btn btn-sm btn-secondary" style="flex:1; padding:6px;" onclick="setBpView('week')">📊 ${w.label}</button>
                `).join('')}
            </div>
        `;

        const validWeeks = weeks.filter(w => w.avgSys !== null);
        let avgSys = null, avgDia = null;
        if (validWeeks.length > 0) {
            avgSys = Math.round(validWeeks.reduce((a,b) => a + b.avgSys, 0) / validWeeks.length);
            avgDia = Math.round(validWeeks.reduce((a,b) => a + b.avgDia, 0) / validWeeks.length);
        }
        html += `
            <div class="card" style="background:linear-gradient(135deg,#0a5a7a,#0d9488); color:white; margin-top:8px;">
                <div style="font-size:13px; opacity:0.9;">Monthly Average</div>
                <div style="font-size:28px; font-weight:800;">${avgSys !== null ? `${avgSys}/${avgDia}` : '—'}</div>
                <div style="font-size:13px; opacity:0.8;">${avgSys !== null ? getBpStatus(avgSys, avgDia).label : 'Log readings'}</div>
            </div>
        `;

        return html;
    }

    // ============================================================
    //  MEDICATIONS
    // ============================================================
    function renderMeds() {
        const meds = state.medications;
        let html = `
            <div class="flex-between"><span style="font-weight:700; font-size:20px;">💊 Medications</span>
                <button class="btn btn-primary btn-sm" style="width:auto; padding:6px 14px; border-radius:40px;" onclick="openAddMed()">➕ Add</button>
            </div>
        `;

        if (meds.length === 0) {
            html += '<div style="color:#8aabba; font-size:14px; padding:12px 0;">No medications added yet</div>';
        } else {
            meds.forEach(m => {
                html += `
                    <div class="card" style="border-left:4px solid ${m.diabetesRelated ? '#0a5a7a' : '#8a5a7a'};">
                        <div class="flex-between">
                            <span style="font-weight:700;">${m.name}</span>
                            <span style="font-size:11px; color:#5a7a8a;">${m.type}</span>
                        </div>
                        <div style="font-size:13px; margin:4px 0;">
                            <span class="medication-brand">${m.brand} (${m.country})</span>
                        </div>
                        <div style="font-size:13px; display:flex; gap:12px; flex-wrap:wrap;">
                            <span>💊 ${m.dosage} ${m.unit}</span>
                            <span>🕐 ${m.timeOfDay}</span>
                            <span>📅 ${m.startDate} → ${m.endDate}</span>
                        </div>
                        ${m.diabetesRelated ? '' : `<div style="font-size:12px; color:#5a7a8a;">Reason: ${m.reason || 'Not specified'}</div>`}
                        <div class="flex-between mt-1">
                            <span style="font-size:13px; color:#5a7a8a;">🔔 Reminder</span>
                            <div class="toggle ${m.reminder?'active':''}" onclick="toggleMedReminder(${m.id})"><div class="dot"></div></div>
                            <button class="btn btn-danger btn-xs" onclick="openEditMed(${m.id})" style="width:auto; padding:2px 10px; font-size:10px;">✏️</button>
                            <button class="btn btn-danger btn-xs" onclick="deleteMedicationById(${m.id})" style="width:auto; padding:2px 10px; font-size:10px;">🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        return html;
    }

    function toggleMedReminder(id) {
        const med = state.medications.find(m => m.id === id);
        if (med) { med.reminder = !med.reminder; showToast(med.reminder ? '🔔 Reminder on' : '🔕 Reminder off'); render(); }
    }

    function openAddMed() {
        editingMedId = null;
        document.getElementById('medModalTitle').textContent = '➕ Add Medication';
        document.getElementById('medDeleteBtn').style.display = 'none';
        document.getElementById('medName').value = '';
        document.getElementById('medDiabetesRelated').value = 'yes';
        document.getElementById('medReason').value = '';
        document.getElementById('medReasonGroup').style.display = 'none';
        document.getElementById('medType').value = 'Oral';
        document.getElementById('medBrand').value = '';
        document.getElementById('medCountry').value = '';
        document.getElementById('medDosage').value = '';
        document.getElementById('medUnit').value = 'mg';
        document.getElementById('medTime').value = '';
        document.getElementById('medStart').value = state.today;
        document.getElementById('medEnd').value = '2026-12-31';
        document.getElementById('medReminder').value = 'on';
        document.getElementById('medReminderType').value = 'time';
        document.getElementById('medReminderTime').value = '08:00';
        document.getElementById('medReminderInterval').value = '6';
        toggleMedReason();
        toggleMedReminderType();
        document.getElementById('medModal').classList.add('show');
    }

    function openEditMed(id) {
        const med = state.medications.find(m => m.id === id);
        if (!med) return;
        editingMedId = id;
        document.getElementById('medModalTitle').textContent = '✏️ Edit Medication';
        document.getElementById('medDeleteBtn').style.display = 'block';
        document.getElementById('medName').value = med.name;
        document.getElementById('medDiabetesRelated').value = med.diabetesRelated ? 'yes' : 'no';
        document.getElementById('medReason').value = med.reason || '';
        toggleMedReason();
        document.getElementById('medType').value = med.type;
        document.getElementById('medBrand').value = med.brand;
        document.getElementById('medCountry').value = med.country;
        document.getElementById('medDosage').value = med.dosage;
        document.getElementById('medUnit').value = med.unit;
        document.getElementById('medTime').value = med.timeOfDay;
        document.getElementById('medStart').value = med.startDate;
        document.getElementById('medEnd').value = med.endDate;
        document.getElementById('medReminder').value = med.reminder ? 'on' : 'off';
        document.getElementById('medReminderType').value = med.reminderType || 'time';
        document.getElementById('medReminderTime').value = med.reminderTime || '08:00';
        document.getElementById('medReminderInterval').value = med.intervalHours || '6';
        toggleMedReminderType();
        document.getElementById('medModal').classList.add('show');
    }

    function closeMedModal() {
        document.getElementById('medModal').classList.remove('show');
    }

    function toggleMedReason() {
        const val = document.getElementById('medDiabetesRelated').value;
        document.getElementById('medReasonGroup').style.display = val === 'no' ? 'block' : 'none';
    }

    function toggleMedReminderType() {
        const val = document.getElementById('medReminderType').value;
        document.getElementById('medReminderTimeGroup').style.display = val === 'time' ? 'block' : 'none';
        document.getElementById('medReminderIntervalGroup').style.display = val === 'interval' ? 'block' : 'none';
    }

    function saveMedication() {
        const name = document.getElementById('medName').value.trim();
        if (!name) { showToast('⚠️ Enter medication name'); return; }
        const diabetesRelated = document.getElementById('medDiabetesRelated').value === 'yes';
        const reason = document.getElementById('medReason').value.trim();
        const type = document.getElementById('medType').value;
        const brand = document.getElementById('medBrand').value.trim() || 'Unknown';
        const country = document.getElementById('medCountry').value.trim() || 'Unknown';
        const dosage = parseFloat(document.getElementById('medDosage').value) || 0;
        const unit = document.getElementById('medUnit').value.trim() || 'mg';
        const timeOfDay = document.getElementById('medTime').value.trim() || 'Morning';
        const startDate = document.getElementById('medStart').value || state.today;
        const endDate = document.getElementById('medEnd').value || '2026-12-31';
        const reminder = document.getElementById('medReminder').value === 'on';
        const reminderType = document.getElementById('medReminderType').value;
        const reminderTime = document.getElementById('medReminderTime').value.trim() || null;
        const intervalHours = parseInt(document.getElementById('medReminderInterval').value) || null;

        const medData = {
            name, diabetesRelated, reason: diabetesRelated ? null : reason,
            type, brand, country, dosage, unit, timeOfDay,
            startDate, endDate, reminder, reminderType,
            reminderTime: reminderType === 'time' ? reminderTime : null,
            intervalHours: reminderType === 'interval' ? intervalHours : null
        };

        if (editingMedId) {
            const idx = state.medications.findIndex(m => m.id === editingMedId);
            if (idx !== -1) {
                state.medications[idx] = { ...state.medications[idx], ...medData };
                showToast('✅ Medication updated');
            }
        } else {
            state.medications.push({ id: Date.now(), ...medData });
            showToast('✅ Medication added');
        }
        closeMedModal();
        render();
    }

    function deleteMedication() {
        if (editingMedId) {
            deleteMedicationById(editingMedId);
        }
    }

    function deleteMedicationById(id) {
        if (!confirm('Remove this medication?')) return;
        state.medications = state.medications.filter(m => m.id !== id);
        closeMedModal();
        showToast('🗑️ Medication removed');
        render();
    }

    // ============================================================
    //  REMINDERS
    // ============================================================
    function renderReminders() {
        const reminders = state.reminders;
        let html = `
            <div style="font-weight:700; font-size:20px;">🔔 Reminders</div>
            <div style="color:#5a7a8a; margin-bottom:12px;">Today's schedule</div>
            <button class="btn btn-primary btn-sm mb-1" onclick="openAddReminder()">➕ Add Reminder</button>
        `;

        if (reminders.length === 0) {
            html += '<div style="color:#8aabba; font-size:14px; padding:12px 0;">No reminders set</div>';
        } else {
            reminders.forEach(r => {
                html += `
                    <div class="reminder-item">
                        <div>
                            <div class="reminder-time">${r.time}</div>
                            <div class="reminder-label">${r.title}</div>
                            <div style="font-size:10px; color:#8aabba;">${r.repeat || 'daily'} · ${r.type}</div>
                        </div>
                        <span class="reminder-status ${r.status}">${r.status === 'done' ? '✅ Done' : r.status === 'pending' ? '⏳ Pending' : '❌ Missed'}</span>
                    </div>
                `;
            });
        }

        html += `
            <div class="card mt-1">
                <div style="font-weight:600;">⚙️ Reminder Settings</div>
                <div class="flex-between"><span>Notifications</span><div class="toggle active" onclick="this.classList.toggle('active')"><div class="dot"></div></div></div>
                <div class="flex-between mt-1"><span>Quiet Hours (10 PM – 6 AM)</span><div class="toggle" onclick="this.classList.toggle('active')"><div class="dot"></div></div></div>
            </div>
        `;
        return html;
    }

    function openAddReminder() {
        document.getElementById('remTitle').value = '';
        document.getElementById('remType').value = 'medication';
        document.getElementById('remTime').value = '08:00';
        document.getElementById('remRepeat').value = 'daily';
        document.getElementById('reminderModal').classList.add('show');
    }

    function closeReminderModal() {
        document.getElementById('reminderModal').classList.remove('show');
    }

    function saveReminder() {
        const title = document.getElementById('remTitle').value.trim();
        if (!title) { showToast('⚠️ Enter reminder title'); return; }
        const type = document.getElementById('remType').value;
        const time = document.getElementById('remTime').value.trim() || '08:00';
        const repeat = document.getElementById('remRepeat').value;
        state.reminders.push({ id: Date.now(), type, title, time, repeat, status: 'pending' });
        closeReminderModal();
        showToast('✅ Reminder added');
        render();
    }

    // ============================================================
    //  REPORTS
    // ============================================================
    function renderReports() {
        const reports = state.reports;
        return `
            <div style="font-weight:700; font-size:20px;">📄 Reports</div>
            <div style="color:#5a7a8a; margin-bottom:12px;">Generate and export your data</div>

            <div class="card" style="background:linear-gradient(135deg,#0a5a7a,#0d9488); color:white;">
                <div style="font-weight:700;">✨ Generate New Report</div>
                <div style="font-size:13px; opacity:0.9;">Choose type and format</div>
                <div style="margin:8px 0; display:flex; gap:6px; flex-wrap:wrap;">
                    <select style="flex:1; padding:6px; border-radius:8px; border:1px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.15); color:white; font-weight:600;">
                        <option value="weeks">Weeks</option>
                        <option value="hba1c_2">HbA1c (2-Month)</option>
                        <option value="hba1c_3">HbA1c (3-Month)</option>
                    </select>
                    <select style="flex:1; padding:6px; border-radius:8px; border:1px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.15); color:white; font-weight:600;">
                        <option value="pdf">PDF</option>
                        <option value="csv">CSV</option>
                        <option value="json">JSON</option>
                    </select>
                </div>
                <button class="btn btn-sm" style="background:white; color:#0a5a7a;" onclick="generateReport()">📄 Generate</button>
            </div>

            <div class="card">
                <div style="font-weight:600; margin-bottom:8px;">📁 Report History</div>
                ${reports.length === 0 ? '<div style="color:#8aabba; font-size:13px;">No reports generated yet</div>' :
                reports.slice().reverse().map(r => `
                    <div class="food-item">
                        <span>${r.type} – ${r.date}</span>
                        <span style="font-size:12px; color:#5a7a8a;">${r.format}</span>
                        <span style="cursor:pointer; color:#0a5a7a;" onclick="shareReport('${r.id}')">📤</span>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function generateReport() {
        const now = new Date().toISOString().slice(0,10);
        state.reports.push({ id: Date.now(), type: 'HbA1c (3-Month)', date: now, format: 'PDF' });
        showToast('📄 Report generated!');
        render();
    }

    function shareReport(id) {
        showToast('📤 Sharing report via email/messaging');
    }

    // ============================================================
    //  PROFILE
    // ============================================================
    function renderProfile() {
        const u = state.user;
        return `
            <div style="display:flex; align-items:center; gap:14px; margin-bottom:14px;">
                <div style="width:64px; height:64px; background:linear-gradient(135deg,#0a5a7a,#0d9488); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px; color:white;">👤</div>
                <div>
                    <div style="font-weight:800; font-size:20px;">${u.name}</div>
                    <div style="color:#5a7a8a; font-size:14px;">${u.email}</div>
                    <div style="background:#c5dce8; color:#0a5a7a; padding:2px 12px; border-radius:40px; font-size:11px; font-weight:600; display:inline-block; margin-top:2px;">🩸 ${u.diabetesType} • Since 2018</div>
                </div>
            </div>
            <div class="card">
                <div class="flex-between"><span style="font-weight:700;">🏥 Medical Info</span><span style="color:#0a5a7a; cursor:pointer;" onclick="showToast('Edit mode')">✏️ Edit</span></div>
                <div style="padding:4px 0;"><span style="color:#5a7a8a;">Diabetes:</span> ${u.diabetesType}</div>
                <div style="padding:4px 0;"><span style="color:#5a7a8a;">Diagnosis:</span> ${u.diagnosisDate}</div>
                <div style="padding:4px 0;"><span style="color:#5a7a8a;">Blood Group:</span> ${u.bloodGroup}</div>
                <div style="padding:4px 0;"><span style="color:#5a7a8a;">Other Conditions:</span> ${u.otherConditions.join(', ') || 'None'}</div>
            </div>
            <div class="card">
                <div class="flex-between"><span style="font-weight:700;">📍 Location & Healthcare</span><span style="color:#0a5a7a; cursor:pointer;" onclick="showToast('Edit')">✏️</span></div>
                <div style="padding:4px 0;"><span style="color:#5a7a8a;">Address:</span> ${u.address}</div>
                <div style="padding:4px 0;"><span style="color:#5a7a8a;">Hospital:</span> ${u.hospital}</div>
                <div style="padding:4px 0;"><span style="color:#5a7a8a;">Doctor:</span> ${u.doctorName}</div>
                <div style="padding:4px 0;"><span style="color:#5a7a8a;">Doctor Phone:</span> ${u.doctorPhone}</div>
            </div>
            <div class="card">
                <div class="flex-between"><span style="font-weight:700;">📞 Emergency Contacts</span><span style="color:#0a5a7a; cursor:pointer;" onclick="showToast('Add contact')">➕</span></div>
                ${u.emergencyContacts.map(c => `
                    <div style="padding:4px 0; border-bottom:1px solid #c5dce8;">
                        <div style="font-weight:600;">${c.name} (${c.relation})</div>
                        <div style="font-size:13px; color:#5a7a8a;">${c.phone} · ${c.address}</div>
                    </div>
                `).join('')}
            </div>
            <div class="card">
                <div style="font-weight:700;">⚙️ Settings</div>
                <div class="flex-between" style="padding:6px 0;"><span>🌐 Language</span><span style="color:#0a5a7a; cursor:pointer;" onclick="toggleLanguage()">${state.lang === 'en' ? 'English 🇬🇧' : 'አማርኛ 🇪🇹'}</span></div>
                <div class="flex-between" style="padding:6px 0;"><span>🔔 Notifications</span><div class="toggle active" onclick="this.classList.toggle('active')"><div class="dot"></div></div></div>
                <div class="flex-between" style="padding:6px 0;"><span>☁️ Cloud Sync</span><div class="toggle active" onclick="this.classList.toggle('active')"><div class="dot"></div></div></div>
            </div>
        `;
    }

    // ============================================================
    //  EMERGENCY
    // ============================================================
    function renderEmergency() {
        const u = state.user;
        const latestGlucose = state.glucoseReadings.filter(r => r.date === state.today).slice(0, 3);
        const latestBp = state.bpReadings.filter(r => r.date === state.today).slice(0, 3);
        return `
            <div class="emergency-banner">🚨 EMERGENCY MEDICAL ID · SHOW TO FIRST RESPONDER</div>
            <div class="card" style="border-radius:0 0 18px 18px; margin-top:0;">
                <div style="text-align:center;">
                    <div style="font-size:44px;">👤</div>
                    <div style="font-weight:800; font-size:22px;">${u.name}</div>
                    <div style="background:#fdedec; color:#c0392b; display:inline-block; padding:2px 16px; border-radius:40px; font-weight:600; font-size:13px;">🩸 ${u.diabetesType} · Since ${u.diagnosisDate}</div>
                    <div style="color:#5a7a8a; font-size:13px;">📞 ${u.phone} · 🩸 ${u.bloodGroup}</div>
                </div>
                <div style="margin:12px 0;">
                    <div style="font-weight:600; font-size:14px;">🏥 Other Conditions</div>
                    <div>${u.otherConditions.join(', ') || 'None'}</div>
                </div>
                <div style="background:#f5faff; border-radius:12px; padding:12px; margin:12px 0;">
                    <div style="font-weight:700; font-size:13px;">📞 Emergency Contacts</div>
                    ${u.emergencyContacts.map(c => `
                        <div class="flex-between"><span>${c.name} (${c.relation})</span><span style="font-weight:600;">${c.phone}</span></div>
                    `).join('')}
                </div>
                <div style="background:#f5faff; border-radius:12px; padding:12px; margin:12px 0;">
                    <div style="font-weight:600; font-size:13px;">🏥 Healthcare Provider</div>
                    <div>${u.hospital} · ${u.doctorName}</div>
                    <div style="font-size:13px; color:#5a7a8a;">📞 ${u.doctorPhone}</div>
                </div>
                <div style="background:#fef9e7; border-left:4px solid #f1c40f; padding:12px; border-radius:8px; margin:12px 0;">
                    <div style="font-weight:600; font-size:13px;">📊 Latest Readings</div>
                    ${latestGlucose.map(r => `<div>Glucose: ${r.value} mg/dL (${r.meal} ${r.time})</div>`).join('')}
                    ${latestBp.map(r => `<div>BP: ${r.systolic}/${r.diastolic} (${r.time})</div>`).join('')}
                </div>
                <div style="text-align:center; margin:8px 0;">
                    <div class="qr-placeholder"></div>
                    <div style="font-size:11px; color:#8aabba;">Scan QR for full record</div>
                </div>
                <div class="flex-row" style="gap:8px; margin-top:8px;">
                    <button class="btn btn-danger" style="flex:1; padding:12px;" onclick="showToast('📞 Calling emergency contact')">📞 Call</button>
                    <button class="btn btn-primary" style="flex:1; padding:12px;" onclick="showToast('📤 Shared')">📤 Share</button>
                    <button class="btn btn-secondary" style="flex:1; padding:12px;" onclick="showToast('🖨️ Print view')">🖨️ Print</button>
                </div>
                <div style="text-align:center; margin-top:8px; color:#8aabba; font-size:11px;">Printable version available</div>
            </div>
        `;
    }

    // ============================================================
    //  INIT
    // ============================================================
    render();

    // Expose globals
    window.navigateTo = navigateTo;
    window.toggleLanguage = toggleLanguage;
    window.selectLanguage = selectLanguage;
    window.selectLanguageAndContinue = selectLanguageAndContinue;
    window.switchAuth = switchAuth;
    window.handleLogin = handleLogin;
    window.handleSignup = handleSignup;
    window.handleLogout = handleLogout;
    window.showToast = showToast;
    window.showDailyQuote = showDailyQuote;
    window.closeQuote = closeQuote;
    window.logGlucoseSlot = logGlucoseSlot;
    window.logBpSlot = logBpSlot;
    window.logGlucoseFromHome = logGlucoseFromHome;
    window.logBpFromHome = logBpFromHome;
    window.setGlucoseView = setGlucoseView;
    window.setBpView = setBpView;
    window.drillToGlucoseDay = drillToGlucoseDay;
    window.drillToBpDay = drillToBpDay;
    window.openAddMed = openAddMed;
    window.openEditMed = openEditMed;
    window.closeMedModal = closeMedModal;
    window.saveMedication = saveMedication;
    window.deleteMedication = deleteMedication;
    window.deleteMedicationById = deleteMedicationById;
    window.toggleMedReason = toggleMedReason;
    window.toggleMedReminderType = toggleMedReminderType;
    window.toggleMedReminder = toggleMedReminder;
    window.openAddReminder = openAddReminder;
    window.closeReminderModal = closeReminderModal;
    window.saveReminder = saveReminder;
    window.generateReport = generateReport;
    window.shareReport = shareReport;
    window.toggleProfileDropdown = toggleProfileDropdown;
    window.showSuggestions = showSuggestions;
    window.addCondition = addCondition;
</script>
</body>
